name: CrowdSec HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout Repo
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli 2>/dev/null || true
          sudo cp "$CS_DIR/cmd/cscli/cscli" /usr/local/bin/cscli 2>/dev/null || true

          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

      # -----------------------------
      # Create REAL hub workspace
      # -----------------------------
      - name: Init Hub Workspace
        run: |
          set -e

          mkdir -p $HOME/hub

          cscli hub update

          # Copy official hub if exists
          if [ -d /etc/crowdsec/hub ]; then
            cp -r /etc/crowdsec/hub/* $HOME/hub/ || true
          fi

      # -----------------------------
      # Inject repo into hub (CRITICAL STEP)
      # -----------------------------
      - name: Inject repository into hub
        run: |
          set -e

          rsync -av parsers/ $HOME/hub/parsers/ || true
          rsync -av scenarios/ $HOME/hub/scenarios/ || true
          rsync -av collections/ $HOME/hub/collections/ || true

      # -----------------------------
      # Attach tests correctly
      # -----------------------------
      - name: Attach tests
        run: |
          set -e

          rm -rf $HOME/hub/.tests || true
          cp -r $GITHUB_WORKSPACE/.tests $HOME/hub/.tests

      # -----------------------------
      # Clean runtime
      # -----------------------------
      - name: Clean runtime
        run: |
          set -e

          find $HOME/hub/.tests -type d -name "runtime" -exec rm -rf {} + || true
          find $HOME/hub/.tests -type d -name "results" -exec rm -rf {} + || true

      # -----------------------------
      # Run hubtest (REAL MODE)
      # -----------------------------
      - name: Run HubTests
        run: |
          set -e

          echo "== Running CrowdSec HubTests =="

          cscli hubtest run --all \
            --hub $HOME/hub \
            --report-success

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Debug
        if: failure()
        run: |
          echo "Hub structure:"
          ls -R $HOME/hub || true

          echo "Tests:"
          ls -R $HOME/hub/.tests || true
