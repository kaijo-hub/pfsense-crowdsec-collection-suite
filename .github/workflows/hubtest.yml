name: CrowdSec HubTest (Clean Stable CI)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # 1. CHECKOUT
      # -------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2. DOWNLOAD (STRICT)
      # -------------------------------------------------
      - name: Download CrowdSec
        run: |
          set -euo pipefail

          echo "== Download CrowdSec master =="

          curl -fL https://codeload.github.com/crowdsecurity/crowdsec/tar.gz/refs/heads/master \
            -o crowdsec.tar.gz

          if [ ! -f crowdsec.tar.gz ]; then
            echo "❌ download missing"
            exit 1
          fi

          SIZE=$(stat -c%s crowdsec.tar.gz)
          echo "Size: $SIZE"

          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ invalid download (too small)"
            exit 1
          fi

      # -------------------------------------------------
      # 3. EXTRACT (DETERMINISTIC)
      # -------------------------------------------------
      - name: Extract
        run: |
          set -euo pipefail

          echo "== Extract =="

          rm -rf crowdsec-src
          mkdir crowdsec-src

          tar -xzf crowdsec.tar.gz -C crowdsec-src --strip-components=1

          echo "== Verify structure =="

          if [ ! -f crowdsec-src/Makefile ]; then
            echo "❌ Makefile missing"
            ls -la crowdsec-src
            exit 1
          fi

          if [ ! -d crowdsec-src/cmd ]; then
            echo "❌ cmd dir missing"
            exit 1
          fi

      # -------------------------------------------------
      # 4. BUILD (SINGLE STRATEGY)
      # -------------------------------------------------
      - name: Build CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          echo "== Install build deps =="

          sudo apt-get update -qq
          sudo apt-get install -y -qq make gcc curl git jq

          echo "== Build =="

          export BUILD_VERSION="v1.8.0-dev"
          export BUILD_RE2_WASM=1

          make build

          echo "== Verify binaries =="

          test -f cmd/crowdsec/crowdsec
          test -f cmd/crowdsec-cli/cscli

      # -------------------------------------------------
      # 5. INSTALL
      # -------------------------------------------------
      - name: Install CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          sudo install -m 0755 cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 cmd/crowdsec-cli/cscli /usr/local/bin/cscli

          sudo mkdir -p /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec /etc/crowdsec/hub

          sudo cp -r config/* /etc/crowdsec/

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec /etc/crowdsec/hub

      # -------------------------------------------------
      # 6. VERIFY INSTALL
      # -------------------------------------------------
      - name: Verify install
        run: |
          set -euo pipefail

          cscli version

      # -------------------------------------------------
      # 7. HUB UPDATE (FIXED CONTEXT)
      # -------------------------------------------------
      - name: Hub update
        run: |
          set -euo pipefail

          echo "== Setup hub dir =="

          sudo mkdir -p /etc/crowdsec/hub
          sudo chmod 775 /etc/crowdsec/hub

          echo "== Ensure hub_dir in config =="

          if ! grep -q "hub_dir:" /etc/crowdsec/config.yaml; then
            echo "hub_dir: /etc/crowdsec/hub" | sudo tee -a /etc/crowdsec/config.yaml
          fi

          grep -n "hub_dir" /etc/crowdsec/config.yaml || true

          export CROWDSEC_CONFIG_DIR=/etc/crowdsec

          echo "== Run hub update =="

          cscli hub update

          echo "== Verify index =="

          test -f /etc/crowdsec/hub/.index.json

      # -------------------------------------------------
      # 8. DEBUG + VALIDATE HUB STRUCTURE
      # -------------------------------------------------
      - name: Debug hub structure
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"

          echo "== HUB ROOT =="
          ls -la "$HUB_ROOT" || echo "❌ hub root missing"

          echo "== .index.json =="
          ls -la "$HUB_ROOT/.index.json" || echo "❌ index missing"

          echo "== .tests =="
          ls -R "$HUB_ROOT/.tests" || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R "$HUB_ROOT/parsers" || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R "$HUB_ROOT/scenarios" || echo "❌ scenarios missing"

          echo "== collections (optional) =="
          ls -R "$HUB_ROOT/collections" || echo "⚠️ collections missing (ok)"

      - name: Validate hub structure
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"

          echo "== Validate required structure =="

          if [ ! -f "$HUB_ROOT/.index.json" ]; then
            echo "❌ Missing .index.json in hub root"
            exit 1
          fi

          if [ ! -d "$HUB_ROOT/.tests" ]; then
            echo "❌ Missing .tests directory"
            exit 1
          fi

          if [ ! -d "$HUB_ROOT/parsers" ]; then
            echo "❌ Missing parsers directory"
            exit 1
          fi

          if [ ! -d "$HUB_ROOT/scenarios" ]; then
            echo "❌ Missing scenarios directory"
            exit 1
          fi

          echo "== Validate .tests content =="

          TEST_COUNT=$(find "$HUB_ROOT/.tests" -type f | wc -l)

          if [ "$TEST_COUNT" -eq 0 ]; then
            echo "❌ .tests directory is empty"
            exit 1
          fi

          echo "Found $TEST_COUNT test files"

          echo "== Validate parsers content =="

          PARSER_COUNT=$(find "$HUB_ROOT/parsers" -type f -name "*.yaml" | wc -l)

          if [ "$PARSER_COUNT" -eq 0 ]; then
            echo "❌ No parser YAML files found"
            exit 1
          fi

          echo "Found $PARSER_COUNT parser files"

          echo "== Validate scenarios content =="

          SCENARIO_COUNT=$(find "$HUB_ROOT/scenarios" -type f -name "*.yaml" | wc -l)

          if [ "$SCENARIO_COUNT" -eq 0 ]; then
            echo "❌ No scenario YAML files found"
            exit 1
          fi

          echo "Found $SCENARIO_COUNT scenario files"

          echo "✅ Hub structure is valid"



      # -------------------------------------------------
      # 9. HUBTEST (FIXED: run from hub root directory)
      # -------------------------------------------------
      - name: Hubtest
        run: |
          set -euo pipefail

          echo "== Prepare hubtest environment =="

          export CROWDSEC_CONFIG_DIR=/etc/crowdsec

          # optional but clear: build own hub directory

          mkdir -p /home/runner/hub

          echo "== Copy repo content into hub root =="
          cp -r ./* /home/runner/hub/ || true

          echo "== Copy index into hub root =="
          cp /etc/crowdsec/hub/.index.json /home/runner/hub/.index.json \
            || { echo "❌ failed to copy index"; exit 1; }

          echo "== Verify hub root =="
          ls -la /home/runner/hub | head

          echo "== Run hubtest from hub root =="

          cd /home/runner/hub

          test -f .index.json || {
            echo "❌ .index.json missing in working dir"
            exit 1
          }

          cscli hubtest run --all --report-success

      # -------------------------------------------------
      # 10. DEBUG ON FAILURE
      # -------------------------------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== DEBUG OUTPUT ===="

          echo "--- CONFIG ---"
          ls -la /etc/crowdsec || true

          echo "--- HUB ---"
          ls -la /etc/crowdsec/hub || true

          echo "--- VERSION ---"
          cscli version || true
