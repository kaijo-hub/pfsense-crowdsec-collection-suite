name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec manually
      # -----------------------------
      - name: Install CrowdSec manually
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)
          echo "CrowdSec directory: $CS_DIR"

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli
          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

          sudo mkdir -p /etc/crowdsec
          sudo cp -r "$CS_DIR/config/"* /etc/crowdsec/

          sudo touch /etc/crowdsec/local_api_credentials.yaml
          sudo touch /etc/crowdsec/online_api_credentials.yaml

          sudo chown -R runner:runner /etc/crowdsec

          crowdsec -version
          cscli version

      # -----------------------------
      # FIX: CrowdSec runtime dirs
      # -----------------------------
      - name: Fix CrowdSec runtime directories
        run: |
          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec
          sudo chown -R runner:runner /var/lib/crowdsec
          sudo chown -R runner:runner /var/log/crowdsec

      # -----------------------------
      # Prepare hub directory
      # -----------------------------
      - name: Prepare hub directory
        run: |
          rm -rf ~/hub
          mkdir -p ~/hub
          cp -r . ~/hub/

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="

          cscli hubtest run . \
            --all \
            --report-success \
            --hub ~/hub
