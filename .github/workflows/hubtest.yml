name: CrowdSec HubTest (v1.8+ strict)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec (FORCE v1.8+)
      # -----------------------------
      - name: Install CrowdSec v1.8+
        run: |
          set -e

          echo "== Fetch latest release tag =="
          TAG=$(curl -s https://api.github.com/repos/crowdsecurity/crowdsec/releases/latest | grep tag_name | cut -d '"' -f 4)

          echo "Latest tag: $TAG"

          if ! echo "$TAG" | grep -q "^v1\.[8-9]"; then
            echo "❌ Latest version is NOT >= v1.8 (got $TAG)"
            exit 1
          fi

          echo "== Download =="
          wget -q https://github.com/crowdsecurity/crowdsec/releases/download/$TAG/crowdsec-release.tgz \
          || { echo "❌ download failed"; exit 1; }

          echo "== Extract =="
          tar -xzf crowdsec-release.tgz \
          || { echo "❌ extract failed"; exit 1; }

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          [ -z "$CS_DIR" ] && { echo "❌ extract dir not found"; exit 1; }

          echo "== Install binaries =="
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          echo "== Install full runtime =="
          sudo mkdir -p /etc/crowdsec
          sudo cp -r "$CS_DIR/config/"* /etc/crowdsec/

          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

          echo "== Verify version =="
          VERSION=$(cscli version | grep version | head -n1 | awk '{print $2}')
          echo "Installed: $VERSION"

          if ! echo "$VERSION" | grep -q "^v1\.[8-9]"; then
            echo "❌ Wrong version installed ($VERSION)"
            exit 1
          fi

      # -----------------------------
      # Validate config load
      # -----------------------------
      - name: Validate config
        run: |
          set -e

          echo "== Check config files =="

          for f in config.yaml acquis.yaml profiles.yaml simulation.yaml context.yaml local_api_credentials.yaml online_api_credentials.yaml; do
            if [ ! -f "/etc/crowdsec/$f" ]; then
              echo "❌ Missing $f"
              exit 1
            fi
          done

          echo "== Test config loading =="

          cscli hub list > /dev/null \
          || { echo "❌ config not loadable"; exit 1; }

      # -----------------------------
      # Init hub
      # -----------------------------
      - name: Init hub
        run: |
          set -e

          echo "== hub update =="

          cscli hub update \
          || { echo "❌ hub update failed"; exit 1; }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            exit 1
          fi

      # -----------------------------
      # Prepare hub workspace
      # -----------------------------
      - name: Prepare hub
        run: |
          set -e

          mkdir -p ~/hub

          cp -r /etc/crowdsec/hub/* ~/hub/ \
          || { echo "❌ hub copy failed"; exit 1; }

      # -----------------------------
      # Inject repo
      # -----------------------------
      - name: Inject repo
        run: |
          set -e

          [ -d parsers ] && rsync -av parsers/ ~/hub/parsers/ || echo "⚠ no parsers"
          [ -d scenarios ] && rsync -av scenarios/ ~/hub/scenarios/ || echo "⚠ no scenarios"
          [ -d collections ] && rsync -av collections/ ~/hub/collections/ || echo "⚠ no collections"

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing"
            exit 1
          fi

          rm -rf ~/hub/.tests || true
          ln -s $GITHUB_WORKSPACE/.tests ~/hub/.tests

      # -----------------------------
      # Run HubTests
      # -----------------------------
      - name: Run HubTests
        run: |
          set -e

          cd ~/hub

          echo "== Running hubtest =="

          cscli hubtest run --all --hub ~/hub --report-success \
          || { echo "❌ hubtest failed"; exit 1; }

      # -----------------------------
      # Debug
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "==== DEBUG ===="

          echo "--- VERSION ---"
          cscli version

          echo "--- CONFIG ---"
          ls -l /etc/crowdsec

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing"

          echo "--- TESTS ---"
          ls -R ~/hub/.tests || true
