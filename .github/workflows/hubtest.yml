name: CrowdSec HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y git rsync wget tar

      # -----------------------------
      # FIXED INSTALL STEP (ROBUST)
      # -----------------------------
      - name: Install CrowdSec (stable)
        run: |
          set -e

          echo "== Download CrowdSec =="
          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz \
            || { echo "❌ download failed"; exit 1; }

          tar -xzf crowdsec-release.tgz \
            || { echo "❌ extract failed"; exit 1; }

          echo "== Locate CrowdSec directory =="

          CS_DIR=""
          for d in crowdsec-v*/; do
            if [ -d "$d/cmd/crowdsec" ] && [ -d "$d/cmd/crowdsec-cli" ]; then
              CS_DIR="$d"
              break
            fi
          done

          if [ -z "$CS_DIR" ]; then
            echo "❌ CrowdSec directory not found"
            ls -R .
            exit 1
          fi

          echo "✔ Using: $CS_DIR"

          # -----------------------------
          # SAFE INSTALL (NO find, NO symlinks)
          # -----------------------------
          if [ ! -f "$CS_DIR/cmd/crowdsec/crowdsec" ]; then
            echo "❌ crowdsec binary missing"
            exit 1
          fi

          if [ ! -f "$CS_DIR/cmd/crowdsec-cli/cscli" ]; then
            echo "❌ cscli binary missing"
            exit 1
          fi

          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          echo "== Versions =="
          crowdsec -version || { echo "❌ crowdsec failed"; exit 1; }
          cscli version || { echo "❌ cscli failed"; exit 1; }

      # -----------------------------
      # Create FULL minimal config (v1.7 safe)
      # -----------------------------
      - name: Create CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec

          echo "common:" | sudo tee /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml

          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /tmp/crowdsec.db" | sudo tee -a /etc/crowdsec/config.yaml

          echo "" | sudo tee -a /etc/crowdsec/config.yaml

          echo "api:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  server:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    listen_uri: 127.0.0.1:8080" | sudo tee -a /etc/crowdsec/config.yaml

          if [ ! -f /etc/crowdsec/config.yaml ]; then
            echo "❌ config.yaml missing"
            exit 1
          fi

          echo "== CONFIG =="
          cat /etc/crowdsec/config.yaml

      # -----------------------------
      # Init Hub (with full error handling)
      # -----------------------------
      - name: Init Hub
        run: |
          set -e

          mkdir -p ~/hub

          echo "== Hub update =="

          cscli hub update \
            || { echo "❌ hub update failed"; exit 1; }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            exit 1
          fi

          echo "== Copy hub =="

          sudo cp -r /etc/crowdsec/hub/* ~/hub/ \
            || { echo "❌ hub copy failed"; exit 1; }

          sudo chown -R $USER:$USER ~/hub

      # -----------------------------
      # Inject repo content
      # -----------------------------
      - name: Inject repo
        run: |
          set -e

          [ -d parsers ] || { echo "❌ parsers missing"; exit 1; }
          [ -d scenarios ] || { echo "❌ scenarios missing"; exit 1; }

          rsync -av parsers/ ~/hub/parsers/
          rsync -av scenarios/ ~/hub/scenarios/
          rsync -av collections/ ~/hub/collections/ || true

      # -----------------------------
      # Prepare tests
      # -----------------------------
      - name: Prepare tests
        run: |
          set -e

          [ -d "$GITHUB_WORKSPACE/.tests" ] || { echo "❌ .tests missing"; exit 1; }
          [ -d ~/hub/.tests ] || { echo "❌ hub .tests missing"; exit 1; }

          mv ~/hub/.tests ~/hub/.tests.orig
          ln -s $GITHUB_WORKSPACE/.tests ~/hub/.tests

          cp ~/hub/.tests.orig/template_* ~/hub/.tests/ \
            || { echo "❌ template copy failed"; exit 1; }

      # -----------------------------
      # Debug BEFORE RUN
      # -----------------------------
      - name: Debug hub state
        run: |
          echo "==== HUB ===="
          ls -R ~/hub || true

          echo "==== TESTS ===="
          ls -R ~/hub/.tests || true

      # -----------------------------
      # Run hubtest (final safe execution)
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          cscli hubtest run --all \
            --hub ~/hub \
            --report-success \
            --debug \
            || { echo "❌ hubtest failed"; exit 1; }

      # -----------------------------
      # Failure debug dump
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "==== FINAL DEBUG ===="

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "❌ missing index"

          echo "--- CONFIG ---"
          cat /etc/crowdsec/config.yaml || echo "❌ missing config"

          echo "--- BINARIES ---"
          which crowdsec || true
          which cscli || true

          echo "--- VERSION ---"
          crowdsec -version || true
          cscli version || true
