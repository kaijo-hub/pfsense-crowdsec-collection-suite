name: CrowdSec HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec FULL (FIX)
      # -----------------------------
      - name: Install CrowdSec (full runtime)
        run: |
          set -e

          echo "== Download =="
          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz \
          || (echo "❌ download failed" && exit 1)

          echo "== Extract =="
          tar -xzf crowdsec-release.tgz \
          || (echo "❌ extract failed" && exit 1)

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          if [ -z "$CS_DIR" ]; then
            echo "❌ crowdsec dir not found"
            exit 1
          fi

          echo "== Install binaries =="
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          echo "== Install FULL config tree (CRITICAL) =="
          sudo mkdir -p /usr/local/lib/crowdsec

          sudo cp -r "$CS_DIR/config" /usr/local/lib/crowdsec/ \
          || (echo "❌ config copy failed" && exit 1)

          if [ ! -d /usr/local/lib/crowdsec/config ]; then
            echo "❌ config dir missing"
            exit 1
          fi

          echo "== Verify portable mode path =="
          ls -R /usr/local/lib/crowdsec/config || exit 1

          echo "== Versions =="
          crowdsec -version || exit 1
          cscli version || exit 1

      # -----------------------------
      # Init Hub (NOW WORKS)
      # -----------------------------
      - name: Init Hub
        run: |
          set -e

          echo "== Run hub update =="
          cscli hub update \
          || (echo "❌ hub update failed" && exit 1)

          echo "== Check index =="
          if [ ! -f /usr/local/lib/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            exit 1
          fi

          echo "== Prepare hub workspace =="
          mkdir -p /home/runner/hub

          cp -r /usr/local/lib/crowdsec/hub/* /home/runner/hub/ \
          || (echo "❌ hub copy failed" && exit 1)

      # -----------------------------
      # Inject repo
      # -----------------------------
      - name: Inject repo into hub
        run: |
          set -e

          echo "== Inject parsers/scenarios =="

          [ -d parsers ] && rsync -av parsers/ /home/runner/hub/parsers/ || echo "⚠ no parsers"
          [ -d scenarios ] && rsync -av scenarios/ /home/runner/hub/scenarios/ || echo "⚠ no scenarios"
          [ -d collections ] && rsync -av collections/ /home/runner/hub/collections/ || echo "⚠ no collections"

          echo "== Link tests =="

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing"
            exit 1
          fi

          rm -rf /home/runner/hub/.tests || true
          ln -s $GITHUB_WORKSPACE/.tests /home/runner/hub/.tests \
          || (echo "❌ symlink failed" && exit 1)

      # -----------------------------
      # Run HubTest
      # -----------------------------
      - name: Run HubTest
        run: |
          set -e

          cd /home/runner/hub || exit 1

          echo "== Running HubTests =="

          cscli hubtest run --all --hub /home/runner/hub --report-success \
          || (echo "❌ hubtest failed" && exit 1)

      # -----------------------------
      # Debug (on failure)
      # -----------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== FAILURE DEBUG ===="

          echo "--- PORTABLE CONFIG ---"
          ls -R /usr/local/lib/crowdsec || true

          echo "--- HUB ---"
          ls -R /home/runner/hub || true

          echo "--- INDEX ---"
          cat /usr/local/lib/crowdsec/hub/.index.json || echo "missing index"

          echo "--- BIN ---"
          which cscli
          which crowdsec

          echo "--- VERSION ---"
          cscli version || true
