name: CrowdSec HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      CONFIG_PATH: /usr/local/lib/crowdsec/config/config.yaml

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          sudo mkdir -p /usr/local/lib/crowdsec
          sudo cp -r "$CS_DIR/config" /usr/local/lib/crowdsec/

          echo "== CONFIG EXISTS =="
          ls -l $CONFIG_PATH || (echo "❌ config missing" && exit 1)

      # -----------------------------
      # VERIFY --config WORKS
      # -----------------------------
      - name: Verify --config flag
        run: |
          set -e

          echo "== Test 1: cscli version with config =="

          cscli version --config $CONFIG_PATH \
          || (echo "❌ --config NOT accepted by cscli" && exit 1)

          echo "== Test 2: invalid config path (must fail) =="

          if cscli version --config /does/not/exist 2>/dev/null; then
            echo "❌ --config ignored (this should have failed)"
            exit 1
          else
            echo "✅ --config is actually used"
          fi

      # -----------------------------
      # DEBUG CONFIG LOADING
      # -----------------------------
      - name: Debug config loading
        run: |
          set -e

          echo "== Running cscli with debug =="

          cscli hub update --config $CONFIG_PATH --debug \
          || (echo "❌ hub update failed (config load issue)" && exit 1)

      # -----------------------------
      # Prepare hub
      # -----------------------------
      - name: Prepare hub
        run: |
          set -e

          mkdir -p /home/runner/hub

          cp -r /usr/local/lib/crowdsec/hub/* /home/runner/hub/ \
          || (echo "❌ hub copy failed" && exit 1)

      # -----------------------------
      # Inject repo
      # -----------------------------
      - name: Inject repo
        run: |
          set -e

          [ -d parsers ] && rsync -av parsers/ /home/runner/hub/parsers/
          [ -d scenarios ] && rsync -av scenarios/ /home/runner/hub/scenarios/
          [ -d collections ] && rsync -av collections/ /home/runner/hub/collections/

          rm -rf /home/runner/hub/.tests || true
          ln -s $GITHUB_WORKSPACE/.tests /home/runner/hub/.tests

      # -----------------------------
      # Run HubTest
      # -----------------------------
      - name: Run HubTest
        run: |
          set -e

          cd /home/runner/hub

          cscli hubtest run --all \
            --hub /home/runner/hub \
            --config $CONFIG_PATH \
            --report-success \
          || (echo "❌ hubtest failed" && exit 1)

      # -----------------------------
      # DEBUG
      # -----------------------------
      - name: Final Debug
        if: failure()
        run: |
          echo "==== DEBUG ===="

          echo "--- CONFIG ---"
          cat $CONFIG_PATH || true

          echo "--- HUB ---"
          ls -R /home/runner/hub || true

          echo "--- INDEX ---"
          cat /usr/local/lib/crowdsec/hub/.index.json || echo "missing"

          echo "--- VERSION ---"
          cscli version || true
