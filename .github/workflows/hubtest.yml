name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec manually (NO wizard, NO systemd)
      # -----------------------------
      - name: Install CrowdSec manually
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)
          echo "CrowdSec directory: $CS_DIR"

          # Install binaries
          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli
          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

          # Install default config
          sudo mkdir -p /etc/crowdsec
          sudo cp -r "$CS_DIR/config/"* /etc/crowdsec/

          # Ensure required files exist
          sudo touch /etc/crowdsec/local_api_credentials.yaml
          sudo touch /etc/crowdsec/online_api_credentials.yaml

          # Fix permissions
          sudo chown -R runner:runner /etc/crowdsec

          echo "Installed config:"
          ls -l /etc/crowdsec

          crowdsec -version
          cscli version

      # -----------------------------
      # Prepare hub directory
      # -----------------------------
      - name: Prepare hub directory
        run: |
          set -e
          rm -rf ~/hub
          mkdir -p ~/hub
          cp -r . ~/hub/

      # -----------------------------
      # Debug hub
      # -----------------------------
      - name: Debug hub structure
        run: |
          echo "== .tests =="
          ls -R ~/hub/.tests || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R ~/hub/parsers || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R ~/hub/scenarios || echo "❌ scenarios missing"

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="

          cscli hubtest run . \
            --all \
            --report-success \
            --hub ~/hub

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Workspace =="
          ls -R

          echo "== Hub =="
          ls -R ~/hub || true
