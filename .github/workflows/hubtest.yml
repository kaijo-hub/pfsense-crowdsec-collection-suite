name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec binaries
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli 2>/dev/null || \
          sudo cp "$CS_DIR/cmd/cscli/cscli" /usr/local/bin/cscli

          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

          crowdsec -version
          cscli version

      # -----------------------------
      # Initialize hub (official index)
      # -----------------------------
      - name: Init CrowdSec Hub
        run: |
          set -e

          cscli hub update

      # -----------------------------
      # Register local repo as hub
      # -----------------------------
      - name: Register local hub
        run: |
          set -e

          # Ensure clean hub state
          rm -rf /tmp/crowdsec-hub
          mkdir -p /tmp/crowdsec-hub

          # Use repo as local hub source (maintainer pattern)
          cscli hub add local $GITHUB_WORKSPACE

      # -----------------------------
      # Debug (optional but useful)
      # -----------------------------
      - name: Debug hub state
        run: |
          set -e

          cscli hub list || true
          cscli hub show local || true

      # -----------------------------
      # Run hubtest (MAINTAINER MODE)
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          echo "== Running CrowdSec Hub Tests =="

          cscli hubtest run local \
            --all \
            --report-success

      # -----------------------------
      # Debug logs on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Hub structure =="
          ls -R $GITHUB_WORKSPACE || true

          echo "== cscli state =="
          cscli hub list || true
