name: CrowdSec HubTest (nightly master)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      CROWDSEC_REPO: https://github.com/crowdsecurity/crowdsec

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Fetch MASTER artifacts
      # -----------------------------
      - name: Download CrowdSec master build
        run: |
          set -e

          echo "== Fetch latest master release artifacts =="

          # Get latest successful build artifact from releases (not tagged version)
          URL=$(curl -s https://api.github.com/repos/crowdsecurity/crowdsec/actions/artifacts \
            | grep -Eo '"archive_download_url":"[^"]+"' \
            | head -n 1 \
            | cut -d '"' -f 4)

          if [ -z "$URL" ]; then
            echo "❌ No artifact found (GitHub API)"
            exit 1
          fi

          echo "Artifact URL: $URL"

          wget -q -O crowdsec-master.zip "$URL" || {
            echo "❌ download failed"
            exit 1
          }

          unzip -q crowdsec-master.zip || {
            echo "❌ unzip failed"
            exit 1
          }

      # -----------------------------
      # Detect build dir
      # -----------------------------
      - name: Locate build directory
        run: |
          set -e

          CS_DIR=$(find . -maxdepth 2 -type d -name "crowdsec*" | head -n 1)

          if [ -z "$CS_DIR" ]; then
            echo "❌ CrowdSec build directory not found"
            exit 1
          fi

          echo "Build dir: $CS_DIR"
          echo "CS_DIR=$CS_DIR" >> $GITHUB_ENV

      # -----------------------------
      # Install binaries (MASTER)
      # -----------------------------
      - name: Install CrowdSec binaries
        run: |
          set -e

          echo "== Installing binaries =="

          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          echo "== Verify version =="
          cscli version || {
            echo "❌ cscli not working"
            exit 1
          }

      # -----------------------------
      # Install full runtime (CRITICAL)
      # -----------------------------
      - name: Install runtime config
        run: |
          set -e

          echo "== Installing config tree =="

          sudo mkdir -p /etc/crowdsec
          sudo cp -r "$CS_DIR/config/"* /etc/crowdsec/

          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

          echo "== Validate config presence =="

          for f in config.yaml acquis.yaml profiles.yaml simulation.yaml; do
            if [ ! -f "/etc/crowdsec/$f" ]; then
              echo "❌ Missing $f"
              exit 1
            fi
          done

      # -----------------------------
      # FIRST VALIDATION (NO --config)
      # -----------------------------
      - name: Validate CrowdSec runtime
        run: |
          set -e

          echo "== Sanity check =="

          crowdsec -t || {
            echo "❌ crowdsec config invalid"
            exit 1
          }

          cscli version

      # -----------------------------
      # HUB UPDATE (CRITICAL STEP)
      # -----------------------------
      - name: Hub update
        run: |
          set -e

          echo "== Running hub update =="

          cscli hub update || {
            echo "❌ hub update failed"
            exit 1
          }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            exit 1
          fi

      # -----------------------------
      # Prepare hub workspace
      # -----------------------------
      - name: Prepare hub workspace
        run: |
          set -e

          mkdir -p ~/hub

          cp -r /etc/crowdsec/hub/* ~/hub/ || {
            echo "❌ hub copy failed"
            exit 1
          }

      # -----------------------------
      # Inject repo content
      # -----------------------------
      - name: Inject local repo
        run: |
          set -e

          echo "== Inject parsers/scenarios =="

          [ -d parsers ] && rsync -av parsers/ ~/hub/parsers/ || echo "⚠ no parsers"
          [ -d scenarios ] && rsync -av scenarios/ ~/hub/scenarios/ || echo "⚠ no scenarios"
          [ -d collections ] && rsync -av collections/ ~/hub/collections/ || echo "⚠ no collections"

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing"
            exit 1
          fi

          rm -rf ~/hub/.tests || true
          ln -s "$GITHUB_WORKSPACE/.tests" ~/hub/.tests

      # -----------------------------
      # RUN HUBTEST
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          cd ~/hub

          echo "== Running hubtest suite =="

          cscli hubtest run --all --hub ~/hub --report-success || {
            echo "❌ hubtest failed"
            exit 1
          }

      # -----------------------------
      # DEBUG ON FAILURE
      # -----------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== DEBUG ===="

          echo "--- VERSION ---"
          cscli version || true

          echo "--- CONFIG ---"
          ls -R /etc/crowdsec || true

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing"

          echo "--- TESTS ---"
          ls -R ~/hub/.tests || true
