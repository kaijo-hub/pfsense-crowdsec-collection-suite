name: CrowdSec HubTest (master build zip)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Download CrowdSec master (NO GIT)
      # -----------------------------
      - name: Download CrowdSec master
        run: |
          set -e

          echo "== Download CrowdSec master ZIP =="

          curl -L \
            https://github.com/crowdsecurity/crowdsecurity/archive/refs/heads/master.zip \
            -o crowdsec-master.zip \
          || {
            echo "❌ download failed"
            exit 1
          }

          echo "== Unzip =="

          unzip -q crowdsec-master.zip || {
            echo "❌ unzip failed"
            exit 1
          }

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsecurity-master" | head -n 1)

          if [ -z "$CS_DIR" ]; then
            echo "❌ CrowdSec source dir not found"
            exit 1
          fi

          echo "CS_DIR=$CS_DIR" >> $GITHUB_ENV

      # -----------------------------
      # Install dependencies + build
      # -----------------------------
      - name: Build CrowdSec (master)
        run: |
          set -e

          echo "== Install build tools =="

          sudo apt-get update -y
          sudo apt-get install -y golang make

          echo "== Build CrowdSec =="

          cd "$CS_DIR"

          make build || {
            echo "❌ build failed"
            exit 1
          }

          echo "== Install binaries =="

          sudo install -m 0755 ./cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 ./cmd/crowdsec-cli/cscli /usr/local/bin/cscli

          echo "== Verify installation =="

          cscli version || {
            echo "❌ cscli failed"
            exit 1
          }

          crowdsec -t || {
            echo "❌ crowdsec test failed"
            exit 1
          }

      # -----------------------------
      # Install runtime config
      # -----------------------------
      - name: Install CrowdSec config
        run: |
          set -e

          echo "== Install config =="

          sudo mkdir -p /etc/crowdsec
          sudo cp -r "$CS_DIR/config/"* /etc/crowdsec/

          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

          echo "== Validate config files =="

          for f in config.yaml acquis.yaml profiles.yaml simulation.yaml context.yaml; do
            if [ ! -f "/etc/crowdsec/$f" ]; then
              echo "❌ missing $f"
              exit 1
            fi
          done

      # -----------------------------
      # Hub update
      # -----------------------------
      - name: Hub update
        run: |
          set -e

          echo "== cscli hub update =="

          cscli hub update || {
            echo "❌ hub update failed"
            exit 1
          }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            exit 1
          fi

      # -----------------------------
      # Prepare hub workspace
      # -----------------------------
      - name: Prepare hub workspace
        run: |
          set -e

          mkdir -p ~/hub

          cp -r /etc/crowdsec/hub/* ~/hub/ || {
            echo "❌ hub copy failed"
            exit 1
          }

      # -----------------------------
      # Inject repo content
      # -----------------------------
      - name: Inject local repository content
        run: |
          set -e

          echo "== Inject parsers/scenarios/collections =="

          [ -d parsers ] && rsync -av parsers/ ~/hub/parsers/ || echo "⚠ no parsers"
          [ -d scenarios ] && rsync -av scenarios/ ~/hub/scenarios/ || echo "⚠ no scenarios"
          [ -d collections ] && rsync -av collections/ ~/hub/collections/ || echo "⚠ no collections"

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing"
            exit 1
          fi

          rm -rf ~/hub/.tests || true
          ln -s "$GITHUB_WORKSPACE/.tests" ~/hub/.tests

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          cd ~/hub

          echo "== Running hubtest suite =="

          cscli hubtest run --all --hub ~/hub --report-success || {
            echo "❌ hubtest failed"
            exit 1
          }

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "==== DEBUG ===="

          echo "--- VERSION ---"
          cscli version || true

          echo "--- CONFIG ---"
          ls -R /etc/crowdsec || true

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing"

          echo "--- TESTS ---"
          ls -R ~/hub/.tests || true
