name: CrowdSec Hub CI (v1.7 fixed)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget tar rsync

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz || exit 1
          tar -xzf crowdsec-release.tgz || exit 1

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)
          [ -n "$CS_DIR" ] || { echo "❌ missing crowdsec dir"; exit 1; }

          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          crowdsec -version || exit 1
          cscli version || exit 1

      # -----------------------------
      # FULL MINIMAL CONFIG (CRITICAL FIX)
      # -----------------------------
      - name: Create full minimal config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec

          # config.yaml
          echo "common:" | sudo tee /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /tmp/crowdsec.db" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "api:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  server:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    listen_uri: 127.0.0.1:8080" | sudo tee -a /etc/crowdsec/config.yaml

          # REQUIRED FILES
          sudo touch /etc/crowdsec/acquis.yaml
          sudo touch /etc/crowdsec/profiles.yaml
          sudo touch /etc/crowdsec/simulation.yaml
          sudo touch /etc/crowdsec/context.yaml
          sudo touch /etc/crowdsec/local_api_credentials.yaml
          sudo touch /etc/crowdsec/online_api_credentials.yaml

          echo "== CONFIG CHECK =="
          ls -l /etc/crowdsec

      # -----------------------------
      # Hub update
      # -----------------------------
      - name: Initialize hub
        run: |
          set -e

          echo "== hub update =="

          cscli hub update || { echo "❌ hub update failed"; exit 1; }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ index missing"
            ls -R /etc/crowdsec || true
            exit 1
          fi

      # -----------------------------
      # Prepare hub workspace
      # -----------------------------
      - name: Prepare hub workspace
        run: |
          set -e

          mkdir -p ~/hub
          rsync -a /etc/crowdsec/hub/ ~/hub/ || exit 1

      # -----------------------------
      # Inject repo content
      # -----------------------------
      - name: Inject collection
        run: |
          set -e

          rsync -a parsers/ ~/hub/parsers/ || exit 1
          rsync -a scenarios/ ~/hub/scenarios/ || exit 1

          if [ -d collections ]; then
            rsync -a collections/ ~/hub/collections/
          fi

      # -----------------------------
      # Attach tests
      # -----------------------------
      - name: Attach tests
        run: |
          set -e

          [ -d "$GITHUB_WORKSPACE/.tests" ] || { echo "❌ missing .tests"; exit 1; }

          rm -rf ~/hub/.tests || true
          ln -s "$GITHUB_WORKSPACE/.tests" ~/hub/.tests || exit 1

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          echo "== Running hubtest =="

          cscli hubtest run \
            --all \
            --hub ~/hub \
            --report-success \
            --debug \
            || { echo "❌ hubtest failed"; exit 1; }

      # -----------------------------
      # Failure debug
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "==== FAILURE DEBUG ===="

          echo "--- CONFIG ---"
          ls -l /etc/crowdsec || true

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing"

          echo "--- VERSION ---"
          cscli version || true
          crowdsec -version || true
