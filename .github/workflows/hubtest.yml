name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo cp "$CS_DIR/cmd/cscli/cscli" /usr/local/bin/cscli 2>/dev/null || \
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

          crowdsec -version
          cscli version

      # -----------------------------
      # Runtime directory (CI safe)
      # -----------------------------
      - name: Prepare runtime
        run: |
          set -e
          mkdir -p /home/runner/crowdsec-runtime

      # -----------------------------
      # CrowdSec config (NO EOF / NO HEREDOC)
      # -----------------------------
      - name: Setup CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec
          sudo rm -f /etc/crowdsec/config.yaml

          echo "common:" | sudo tee /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml

          echo "" | sudo tee -a /etc/crowdsec/config.yaml

          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /home/runner/crowdsec-runtime/data.db" | sudo tee -a /etc/crowdsec/config.yaml

          echo "" | sudo tee -a /etc/crowdsec/config.yaml

          echo "api:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  server:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    listen_uri: 127.0.0.1:8080" | sudo tee -a /etc/crowdsec/config.yaml

          echo "" | sudo tee -a /etc/crowdsec/config.yaml

          echo "crowdsec_service:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  runtime_dir: /home/runner/crowdsec-runtime" | sudo tee -a /etc/crowdsec/config.yaml

          echo "=== CONFIG ==="
          cat /etc/crowdsec/config.yaml

      # -----------------------------
      # Prepare hub workspace
      # -----------------------------
      - name: Prepare hub
        run: |
          set -e

          mkdir -p $GITHUB_WORKSPACE/hub
          cp -r . $GITHUB_WORKSPACE/hub

      # -----------------------------
      # Validate hub
      # -----------------------------
      - name: Validate hub
        run: |
          set -e

          cd $GITHUB_WORKSPACE/hub

          test -d parsers || (echo "Missing parsers/" && exit 1)
          test -d scenarios || (echo "Missing scenarios/" && exit 1)

          echo "Hub OK"

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          cd $GITHUB_WORKSPACE/hub

          echo "== Running hubtest =="

          cscli hubtest run . \
            --all \
            --config /etc/crowdsec/config.yaml \
            --report-success

      # -----------------------------
      # Debug
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "== HUB =="
          ls -R $GITHUB_WORKSPACE/hub || true

          echo "== RUNTIME =="
          ls -R /home/runner/crowdsec-runtime || true
