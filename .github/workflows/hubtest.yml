name: CrowdSec HubTest (Clean Stable CI)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # 1. CHECKOUT
      # -------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2. DOWNLOAD (STRICT)
      # -------------------------------------------------
      - name: Download CrowdSec
        run: |
          set -euo pipefail

          echo "== Download CrowdSec master =="

          curl -fL https://codeload.github.com/crowdsecurity/crowdsec/tar.gz/refs/heads/master \
            -o crowdsec.tar.gz

          if [ ! -f crowdsec.tar.gz ]; then
            echo "❌ download missing"
            exit 1
          fi

          SIZE=$(stat -c%s crowdsec.tar.gz)
          echo "Size: $SIZE"

          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ invalid download (too small)"
            exit 1
          fi

      # -------------------------------------------------
      # 3. EXTRACT (DETERMINISTIC)
      # -------------------------------------------------
      - name: Extract
        run: |
          set -euo pipefail

          echo "== Extract =="

          rm -rf crowdsec-src
          mkdir crowdsec-src

          tar -xzf crowdsec.tar.gz -C crowdsec-src --strip-components=1

          echo "== Verify structure =="

          if [ ! -f crowdsec-src/Makefile ]; then
            echo "❌ Makefile missing"
            ls -la crowdsec-src
            exit 1
          fi

          if [ ! -d crowdsec-src/cmd ]; then
            echo "❌ cmd dir missing"
            exit 1
          fi

      # -------------------------------------------------
      # 4. BUILD (SINGLE STRATEGY)
      # -------------------------------------------------
      - name: Build CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          echo "== Install build deps =="

          sudo apt-get update -qq
          sudo apt-get install -y -qq make gcc curl git jq

          echo "== Build =="

          export BUILD_VERSION="v1.8.0-dev"
          export BUILD_RE2_WASM=1

          make build

          echo "== Verify binaries =="

          test -f cmd/crowdsec/crowdsec
          test -f cmd/crowdsec-cli/cscli

      # -------------------------------------------------
      # 5. INSTALL
      # -------------------------------------------------
      - name: Install CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          sudo install -m 0755 cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 cmd/crowdsec-cli/cscli /usr/local/bin/cscli

          sudo mkdir -p /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

          sudo cp -r config/* /etc/crowdsec/

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

      # -------------------------------------------------
      # 6. VERIFY INSTALL
      # -------------------------------------------------
      - name: Verify install
        run: |
          set -euo pipefail
          cscli version

      # -------------------------------------------------
      # 7. (OPTIONAL) HUB UPDATE (INDEX ONLY)
      # -------------------------------------------------
      - name: Hub update (index only)
        run: |
          set -euo pipefail

          mkdir -p /etc/crowdsec/hub

          if ! grep -q "hub_dir:" /etc/crowdsec/config.yaml; then
            echo "hub_dir: /etc/crowdsec/hub" >> /etc/crowdsec/config.yaml
          fi

          cscli hub update || true

      # -------------------------------------------------
      # 8. FETCH FULL HUB (FIX)
      # -------------------------------------------------
      - name: Fetch CrowdSec Hub
        run: |
          set -euo pipefail

          HUB_SRC="/home/runner/hub-src"

          echo "== Clone CrowdSec Hub =="

          git clone --depth 1 https://github.com/crowdsecurity/hub.git "$HUB_SRC"

          echo "== Verify hub content =="
          ls -R "$HUB_SRC"

      # -------------------------------------------------
      # 9. PREPARE HUB ROOT (FIXED)
      # -------------------------------------------------
      - name: Prepare hub root
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"
          HUB_SRC="/home/runner/hub-src"

          echo "== Create hub root =="
          rm -rf "$HUB_ROOT"
          mkdir -p "$HUB_ROOT"

          echo "== Copy FULL Hub =="
          cp -r "$HUB_SRC"/* "$HUB_ROOT/"

          echo "== Inject repo overrides =="
          [ -d parsers ] && rsync -av parsers/ "$HUB_ROOT/parsers/" || echo "⚠️ no parsers"
          [ -d scenarios ] && rsync -av scenarios/ "$HUB_ROOT/scenarios/" || echo "⚠️ no scenarios"
          [ -d collections ] && rsync -av collections/ "$HUB_ROOT/collections/" || true

          echo "== Copy tests =="
          cp -r .tests "$HUB_ROOT/.tests"

          echo "== Verify hub root =="
          ls -R "$HUB_ROOT"

      # -------------------------------------------------
      # 10. DEBUG HUB STRUCTURE
      # -------------------------------------------------
      - name: Debug hub structure
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"

          echo "== .tests =="
          ls -R "$HUB_ROOT/.tests" || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R "$HUB_ROOT/parsers" || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R "$HUB_ROOT/scenarios" || echo "❌ scenarios missing"

      # -------------------------------------------------
      # 11. VALIDATE HUB STRUCTURE
      # -------------------------------------------------
      - name: Validate hub structure
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"

          [ -f "$HUB_ROOT/.index.json" ] || { echo "❌ Missing .index.json"; exit 1; }
          [ -d "$HUB_ROOT/.tests" ] || { echo "❌ Missing .tests"; exit 1; }
          [ -d "$HUB_ROOT/parsers" ] || { echo "❌ Missing parsers"; exit 1; }
          [ -d "$HUB_ROOT/scenarios" ] || { echo "❌ Missing scenarios"; exit 1; }

          TEST_COUNT=$(find "$HUB_ROOT/.tests" -type f | wc -l)
          [ "$TEST_COUNT" -gt 0 ] || { echo "❌ .tests empty"; exit 1; }

          echo "✅ Hub structure valid"

      # -------------------------------------------------
      # 12. HUBTEST
      # -------------------------------------------------
      - name: Hubtest
        run: |
          set -euo pipefail

          echo "== Run hubtest =="

          export CROWDSEC_CONFIG_DIR=/etc/crowdsec

          cd /home/runner/hub

          cscli hubtest run --all --report-success

      # -------------------------------------------------
      # 13. DEBUG ON FAILURE
      # -------------------------------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== DEBUG OUTPUT ===="

          echo "--- HUB ROOT ---"
          ls -la /home/runner/hub || true

          echo "--- CONFIG ---"
          ls -la /etc/crowdsec || true

          echo "--- VERSION ---"
          cscli version || true
