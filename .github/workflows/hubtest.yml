name: CrowdSec HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y git rsync

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          if [ -z "$CS_DIR" ]; then
            echo "❌ CrowdSec directory not found"
            exit 1
          fi

          if [ ! -f "$CS_DIR/cmd/crowdsec/crowdsec" ]; then
            echo "❌ crowdsec binary missing"
            exit 1
          fi

          if [ ! -f "$CS_DIR/cmd/crowdsec-cli/cscli" ]; then
            echo "❌ cscli binary missing"
            exit 1
          fi

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/
          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

          echo "== Versions =="
          crowdsec -version || { echo "❌ crowdsec failed"; exit 1; }
          cscli version || { echo "❌ cscli failed"; exit 1; }

      # -----------------------------
      # Create minimal config (CRITICAL)
      # -----------------------------
      - name: Create CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec
          sudo rm -f /etc/crowdsec/config.yaml

          echo "common:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /tmp/crowdsec.db" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "api:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  server:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    listen_uri: 127.0.0.1:8080" | sudo tee -a /etc/crowdsec/config.yaml

          if [ ! -f /etc/crowdsec/config.yaml ]; then
            echo "❌ config.yaml creation failed"
            exit 1
          fi

          echo "== Config =="
          cat /etc/crowdsec/config.yaml

      # -----------------------------
      # Init Hub
      # -----------------------------
      - name: Init hub
        run: |
          set -e

          mkdir -p ~/hub

          echo "== Running cscli hub update =="
          cscli hub update || { echo "❌ hub update failed"; exit 1; }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            exit 1
          fi

          echo "== Copy hub =="
          sudo cp -r /etc/crowdsec/hub/* ~/hub/
          sudo chown -R $USER:$USER ~/hub

          if [ ! -d ~/hub/parsers ]; then
            echo "❌ hub parsers missing"
            exit 1
          fi

      # -----------------------------
      # Inject repo
      # -----------------------------
      - name: Inject repo content
        run: |
          set -e

          if [ ! -d parsers ]; then
            echo "❌ repo parsers missing"
            exit 1
          fi

          if [ ! -d scenarios ]; then
            echo "❌ repo scenarios missing"
            exit 1
          fi

          rsync -av parsers/ ~/hub/parsers/
          rsync -av scenarios/ ~/hub/scenarios/
          rsync -av collections/ ~/hub/collections/ || true

      # -----------------------------
      # Prepare tests
      # -----------------------------
      - name: Prepare tests
        run: |
          set -e

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing in repo"
            exit 1
          fi

          if [ ! -d ~/hub/.tests ]; then
            echo "❌ hub .tests missing"
            exit 1
          fi

          mv ~/hub/.tests ~/hub/.tests.orig
          ln -s $GITHUB_WORKSPACE/.tests ~/hub/.tests

          cp ~/hub/.tests.orig/template_* ~/hub/.tests/ || {
            echo "❌ template copy failed"
            exit 1
          }

      # -----------------------------
      # Clean runtime
      # -----------------------------
      - name: Clean runtime/cache
        run: |
          rm -rf ~/hub/.tests/*/runtime || true
          rm -rf ~/hub/.tests/*/result || true
          rm -rf ~/hub/.tests/*/.cache || true

      # -----------------------------
      # PRE-RUN DEBUG
      # -----------------------------
      - name: Debug before run
        run: |
          echo "==== HUB ===="
          ls -R ~/hub

          echo "==== TESTS ===="
          ls -R ~/hub/.tests

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          cscli hubtest run --all \
            --hub ~/hub \
            --report-success \
            --debug || {
              echo "❌ hubtest failed"
              exit 1
            }

      # -----------------------------
      # POST FAILURE DEBUG
      # -----------------------------
      - name: Dump debug info on failure
        if: failure()
        run: |
          echo "==== FINAL DEBUG ===="

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- TESTS ---"
          ls -R ~/hub/.tests || true

          echo "--- INDEX ---"
          cat ~/hub/.index.json || echo "❌ missing index"

          echo "--- CONFIG ---"
          cat /etc/crowdsec/config.yaml || echo "❌ missing config"

          echo "--- CSCLI ---"
          cscli version || true
