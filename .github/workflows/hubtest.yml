name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec properly
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz
          cd crowdsec-v*

          sudo ./wizard.sh --install

          sudo systemctl stop crowdsec || true

          cscli version
          crowdsec -version

      # -----------------------------
      # Prepare hub
      # -----------------------------
      - name: Prepare hub directory
        run: |
          set -e
          rm -rf ~/hub
          mkdir -p ~/hub
          cp -r . ~/hub/

      # -----------------------------
      # Debug hub
      # -----------------------------
      - name: Debug hub structure
        run: |
          echo "== .tests =="
          ls -R ~/hub/.tests || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R ~/hub/parsers || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R ~/hub/scenarios || echo "❌ scenarios missing"

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="

          sudo cscli hubtest run . \
            --all \
            --report-success \
            --hub ~/hub

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Workspace =="
          ls -R

          echo "== Hub =="
          ls -R ~/hub || true
