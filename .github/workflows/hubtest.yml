name: CrowdSec HubTest (Optimized CI)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # 1. CHECKOUT
      # -------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2. CACHE GO BUILD
      # -------------------------------------------------
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      # -------------------------------------------------
      # 3. CACHE CROWDSEC SOURCE
      # -------------------------------------------------
      - name: Cache CrowdSec source
        uses: actions/cache@v4
        with:
          path: crowdsec-src
          key: crowdsec-src-${{ runner.os }}-v1

      # -------------------------------------------------
      # 4. DOWNLOAD (only if cache miss)
      # -------------------------------------------------
      - name: Download CrowdSec
        run: |
          set -euo pipefail

          if [ -d crowdsec-src ]; then
            echo "✅ Using cached CrowdSec source"
            exit 0
          fi

          echo "== Download CrowdSec =="

          curl -fL https://codeload.github.com/crowdsecurity/crowdsec/tar.gz/refs/heads/master \
            -o crowdsec.tar.gz

          mkdir crowdsec-src
          tar -xzf crowdsec.tar.gz -C crowdsec-src --strip-components=1

      # -------------------------------------------------
      # 5. BUILD
      # -------------------------------------------------
      - name: Build CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          sudo apt-get update -qq
          sudo apt-get install -y -qq make gcc jq

          export BUILD_VERSION="v1.8.0-dev"
          export BUILD_RE2_WASM=1

          make build

      # -------------------------------------------------
      # 6. INSTALL
      # -------------------------------------------------
      - name: Install CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          sudo install -m 0755 cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 cmd/crowdsec-cli/cscli /usr/local/bin/cscli

          sudo mkdir -p /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec /etc/crowdsec/hub

          sudo cp -r config/* /etc/crowdsec/

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec /etc/crowdsec/hub

      # -------------------------------------------------
      # 7. VERIFY
      # -------------------------------------------------
      - name: Verify install
        run: cscli version

      # -------------------------------------------------
      # 8. INIT HUB INDEX
      # -------------------------------------------------
      - name: Init hub index
        run: |
          set -euo pipefail

          mkdir -p /etc/crowdsec/hub

          if ! grep -q "hub_dir:" /etc/crowdsec/config.yaml; then
            echo "hub_dir: /etc/crowdsec/hub" >> /etc/crowdsec/config.yaml
          fi

          cscli hub update

      # -------------------------------------------------
      # 9. CACHE HUB
      # -------------------------------------------------
      - name: Cache CrowdSec Hub
        uses: actions/cache@v4
        with:
          path: /home/runner/hub-src
          key: crowdsec-hub-${{ runner.os }}-v1

      # -------------------------------------------------
      # 10. FETCH HUB
      # -------------------------------------------------
      - name: Fetch CrowdSec Hub
        run: |
          set -euo pipefail

          HUB_SRC="/home/runner/hub-src"

          if [ -d "$HUB_SRC/.git" ]; then
            echo "✅ Using cached hub"
          else
            echo "== Cloning hub =="
            git clone --depth 1 https://github.com/crowdsecurity/hub.git "$HUB_SRC"
          fi

      # -------------------------------------------------
      # 11. CACHE GEOIP
      # -------------------------------------------------
      - name: Cache GeoIP
        uses: actions/cache@v4
        with:
          path: /var/lib/crowdsec/data
          key: crowdsec-geoip-${{ runner.os }}-v1

      # -------------------------------------------------
      # 12. PREPARE HUB ROOT
      # -------------------------------------------------
      - name: Prepare hub root
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"
          HUB_SRC="/home/runner/hub-src"

          rm -rf "$HUB_ROOT"
          mkdir -p "$HUB_ROOT"

          cp -a "$HUB_SRC"/. "$HUB_ROOT/"

          echo "== Remove upstream tests =="
          rm -rf "$HUB_ROOT/.tests"

          echo "== Inject repo overrides =="
          [ -d parsers ] && rsync -av parsers/ "$HUB_ROOT/parsers/" || true
          [ -d scenarios ] && rsync -av scenarios/ "$HUB_ROOT/scenarios/" || true
          [ -d collections ] && rsync -av collections/ "$HUB_ROOT/collections/" || true

          echo "== Copy tests =="
          cp -r .tests "$HUB_ROOT/.tests"

          echo "== Copy index =="
          cp /etc/crowdsec/hub/.index.json "$HUB_ROOT/"

          test -f "$HUB_ROOT/.index.json"

      # -------------------------------------------------
      # 13. HUBTEST
      # -------------------------------------------------
      - name: Run HubTest
        run: |
          set -euo pipefail

          export CROWDSEC_CONFIG_DIR=/etc/crowdsec

          cd /home/runner/hub

          cscli hubtest run --all --report-success

      # -------------------------------------------------
      # 14. DEBUG ON FAILURE
      # -------------------------------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== DEBUG ===="

          echo "--- HUB ROOT ---"
          ls -la /home/runner/hub || true

          echo "--- TESTS ---"
          ls -R /home/runner/hub/.tests || true

          echo "--- CONFIG ---"
          cat /etc/crowdsec/config.yaml || true
