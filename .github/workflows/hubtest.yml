name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo cp "$CS_DIR/cmd/cscli/cscli" /usr/local/bin/cscli 2>/dev/null || \
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

          crowdsec -version
          cscli version

      # -----------------------------
      # CI-safe runtime environment
      # -----------------------------
      - name: Prepare runtime environment
        run: |
          set -e

          mkdir -p $HOME/crowdsec-runtime

      # -----------------------------
      # CI-native config (NO /var/lib, NO system paths)
      # -----------------------------
      - name: Setup CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec

          sudo tee /etc/crowdsec/config.yaml > /dev/null << 'EOF'
common:
  daemonize: false
  log_media: stdout
  log_level: info

db_config:
  type: sqlite
  db_path: /home/runner/crowdsec-runtime/data.db

api:
  server:
    listen_uri: 127.0.0.1:8080

crowdsec_service:
  runtime_dir: /home/runner/crowdsec-runtime
EOF

      # -----------------------------
      # Prepare hub workspace
      # -----------------------------
      - name: Prepare hub
        run: |
          set -e

          mkdir -p $GITHUB_WORKSPACE/hub
          cp -r . $GITHUB_WORKSPACE/hub

      # -----------------------------
      # Validate structure
      # -----------------------------
      - name: Validate hub structure
        run: |
          set -e

          cd $GITHUB_WORKSPACE/hub

          [ -d parsers ] || (echo "Missing parsers/" && exit 1)
          [ -d scenarios ] || (echo "Missing scenarios/" && exit 1)

          echo "Hub structure OK"

      # -----------------------------
      # Run hubtest (CI-safe)
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          cd $GITHUB_WORKSPACE/hub

          echo "== Running hubtest =="

          cscli hubtest run . \
            --all \
            --config /etc/crowdsec/config.yaml \
            --report-success

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump logs
        if: failure()
        run: |
          echo "== Hub =="
          ls -R $GITHUB_WORKSPACE/hub || true

          echo "== Runtime =="
          ls -R $HOME/crowdsec-runtime || true
