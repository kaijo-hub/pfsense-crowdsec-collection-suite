name: CrowdSec HubTest (Clean Stable CI)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # 1. CHECKOUT
      # -------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2. CACHE GO BUILD (🔥 SPEED)
      # -------------------------------------------------
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # -------------------------------------------------
      # 3. CACHE CROWDSEC SOURCE
      # -------------------------------------------------
      - name: Cache CrowdSec source
        uses: actions/cache@v4
        with:
          path: crowdsec.tar.gz
          key: crowdsec-src-${{ runner.os }}

      # -------------------------------------------------
      # 4. DOWNLOAD (ONLY IF NOT CACHED)
      # -------------------------------------------------
      - name: Download CrowdSec
        run: |
          set -euo pipefail

          if [ -f crowdsec.tar.gz ]; then
            echo "== Using cached CrowdSec archive =="
            exit 0
          fi

          echo "== Download CrowdSec master =="

          curl -fL https://codeload.github.com/crowdsecurity/crowdsec/tar.gz/refs/heads/master \
            -o crowdsec.tar.gz

          SIZE=$(stat -c%s crowdsec.tar.gz)
          echo "Size: $SIZE"

          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ invalid download"
            exit 1
          fi

      # -------------------------------------------------
      # 5. EXTRACT
      # -------------------------------------------------
      - name: Extract
        run: |
          set -euo pipefail

          rm -rf crowdsec-src
          mkdir crowdsec-src

          tar -xzf crowdsec.tar.gz -C crowdsec-src --strip-components=1

          test -f crowdsec-src/Makefile
          test -d crowdsec-src/cmd

      # -------------------------------------------------
      # 6. BUILD
      # -------------------------------------------------
      - name: Build CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends make gcc curl git jq

          export BUILD_VERSION="v1.8.0-dev"
          export BUILD_RE2_WASM=1

          make build

          test -f cmd/crowdsec/crowdsec
          test -f cmd/crowdsec-cli/cscli

      # -------------------------------------------------
      # 7. INSTALL
      # -------------------------------------------------
      - name: Install CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          sudo install -m 0755 cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 cmd/crowdsec-cli/cscli /usr/local/bin/cscli

          sudo mkdir -p /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

          sudo cp -r config/* /etc/crowdsec/

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

      # -------------------------------------------------
      # 8. VERIFY INSTALL
      # -------------------------------------------------
      - name: Verify install
        run: |
          set -euo pipefail
          cscli version

      # -------------------------------------------------
      # 9. HUB UPDATE (INDEX ONLY)
      # -------------------------------------------------
      - name: Hub update (index only)
        run: |
          set -euo pipefail

          mkdir -p /etc/crowdsec/hub

          if ! grep -q "hub_dir:" /etc/crowdsec/config.yaml; then
            echo "hub_dir: /etc/crowdsec/hub" >> /etc/crowdsec/config.yaml
          fi

          cscli hub update

      # -------------------------------------------------
      # 10. CACHE HUB (🔥 SPEED)
      # -------------------------------------------------
      - name: Cache CrowdSec hub
        uses: actions/cache@v4
        with:
          path: /home/runner/hub-src
          key: crowdsec-hub-${{ runner.os }}

      # -------------------------------------------------
      # 11. FETCH HUB (SMART)
      # -------------------------------------------------
      - name: Fetch CrowdSec Hub
        run: |
          set -euo pipefail

          HUB_SRC="/home/runner/hub-src"

          if [ -d "$HUB_SRC/.git" ]; then
            echo "== Using cached hub =="
          else
            echo "== Cloning hub =="
            git clone --depth 1 https://github.com/crowdsecurity/hub.git "$HUB_SRC"
          fi

      # -------------------------------------------------
      # 12. PREPARE HUB ROOT
      # -------------------------------------------------
      - name: Prepare hub root
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"
          HUB_SRC="/home/runner/hub-src"

          rm -rf "$HUB_ROOT"
          mkdir -p "$HUB_ROOT"

          cp -a "$HUB_SRC"/. "$HUB_ROOT/"

          [ -d parsers ] && rsync -av parsers/ "$HUB_ROOT/parsers/" || true
          [ -d scenarios ] && rsync -av scenarios/ "$HUB_ROOT/scenarios/" || true
          [ -d collections ] && rsync -av collections/ "$HUB_ROOT/collections/" || true

          cp -r .tests "$HUB_ROOT/.tests"

          cp /etc/crowdsec/hub/.index.json "$HUB_ROOT/"

          test -f "$HUB_ROOT/.index.json"

      # -------------------------------------------------
      # 13. HUBTEST
      # -------------------------------------------------
      - name: Hubtest
        run: |
          set -euo pipefail

          export CROWDSEC_CONFIG_DIR=/etc/crowdsec

          cd /home/runner/hub

          cscli hubtest run --all --report-success

      # -------------------------------------------------
      # 14. DEBUG ON FAILURE
      # -------------------------------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== DEBUG OUTPUT ===="

          echo "--- HUB ROOT ---"
          ls -la /home/runner/hub || true

          echo "--- CONFIG ---"
          ls -la /etc/crowdsec || true

          echo "--- VERSION ---"
          cscli version || true
