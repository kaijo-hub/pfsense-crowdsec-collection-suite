name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          mkdir cs
          tar -xzf crowdsec-release.tgz -C cs

          CROWDSEC_BIN=$(find cs -type f -name crowdsec | head -n 1)
          CSCLI_BIN=$(find cs -type f -name cscli | head -n 1)

          if [ -z "$CROWDSEC_BIN" ] || [ -z "$CSCLI_BIN" ]; then
            echo "❌ CrowdSec binaries not found"
            exit 1
          fi

          chmod +x "$CROWDSEC_BIN" "$CSCLI_BIN"
          sudo cp "$CROWDSEC_BIN" /usr/local/bin/crowdsec
          sudo cp "$CSCLI_BIN" /usr/local/bin/cscli

          crowdsec -version
          cscli version

      # -----------------------------
      # Prepare hub directory
      # -----------------------------
      - name: Prepare hub directory
        run: |
          set -e
          rm -rf ~/hub
          mkdir -p ~/hub
          cp -r . ~/hub/

      # -----------------------------
      # Setup CrowdSec config (FULL FIX)
      # -----------------------------
      - name: Setup CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec
          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec

          sudo rm -f /etc/crowdsec/*

          # config.yaml
          {
            echo "common:"
            echo "  daemonize: false"
            echo "  log_media: stdout"
            echo "  log_level: info"
            echo ""
            echo "db_config:"
            echo "  type: sqlite"
            echo "  db_path: /var/lib/crowdsec/data.db"
            echo ""
            echo "api:"
            echo "  server:"
            echo "    listen_uri: 127.0.0.1:8080"
          } | sudo tee /etc/crowdsec/config.yaml > /dev/null

          # profiles.yaml
          {
            echo "name: default"
            echo "filters: []"
          } | sudo tee /etc/crowdsec/profiles.yaml > /dev/null

          # simulation.yaml
          echo "simulation: false" | sudo tee /etc/crowdsec/simulation.yaml > /dev/null

          # context.yaml
          sudo touch /etc/crowdsec/context.yaml

          # acquis.yaml (REQUIRED for CrowdSec 1.6+)
          {
            echo "filenames:"
            echo "  - /dev/null"
            echo "labels:"
            echo "  type: dummy"
          } | sudo tee /etc/crowdsec/acquis.yaml > /dev/null

          # credentials stubs (REQUIRED)
          sudo touch /etc/crowdsec/local_api_credentials.yaml
          sudo touch /etc/crowdsec/online_api_credentials.yaml

          # Fix permissions
          sudo chown -R runner:runner /etc/crowdsec

          echo "CrowdSec config written:"
          ls -l /etc/crowdsec

      # -----------------------------
      # Debug hub
      # -----------------------------
      - name: Debug hub structure
        run: |
          echo "== .tests =="
          ls -R ~/hub/.tests || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R ~/hub/parsers || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R ~/hub/scenarios || echo "❌ scenarios missing"

      # -----------------------------
      # Validate hub
      # -----------------------------
      - name: Validate hub structure
        run: |
          set -e
          [ -d ~/hub/.tests ] || (echo "❌ Missing .tests" && exit 1)
          [ -d ~/hub/parsers ] || (echo "❌ Missing parsers" && exit 1)
          [ -d ~/hub/scenarios ] || (echo "❌ Missing scenarios" && exit 1)
          echo "✅ Hub structure OK"

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="

          cscli hubtest run . \
            --all \
            --report-success \
            --hub ~/hub \
            --config /etc/crowdsec/config.yaml

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Workspace =="
          ls -R

          echo "== Hub =="
          ls -R ~/hub || true
