name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec (robust)
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          echo "== Extracted structure =="
          ls -R

          CROWDSEC_BIN=$(find . -type f -name crowdsec | head -n 1)
          CSCLI_BIN=$(find . -type f -name cscli | head -n 1)

          if [ -z "$CROWDSEC_BIN" ] || [ -z "$CSCLI_BIN" ]; then
            echo "❌ crowdsec or cscli binary not found!"
            exit 1
          fi

          chmod +x "$CROWDSEC_BIN" "$CSCLI_BIN"

          sudo cp "$CROWDSEC_BIN" /usr/local/bin/crowdsec
          sudo cp "$CSCLI_BIN" /usr/local/bin/cscli

          echo "✅ Installed CrowdSec:"
          crowdsec -version
          cscli version

      # -----------------------------
      # Prepare Hub structure (FIXED)
      # -----------------------------
      - name: Prepare hub directory
        run: |
          set -e
          mkdir -p ~/hub

          # IMPORTANT: includes hidden files like .tests
          rsync -a ./ ~/hub/

      # -----------------------------
      # DEBUG STEP
      # -----------------------------
      - name: Debug hub structure
        run: |
          echo "== .tests =="
          ls -R ~/hub/.tests || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R ~/hub/parsers || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R ~/hub/scenarios || echo "❌ scenarios missing"

      # -----------------------------
      # Validate required structure (FIXED)
      # -----------------------------
      - name: Validate hub structure
        run: |
          set -e

          if [ ! -d ~/hub/.tests ]; then
            echo "❌ Missing .tests directory"
            exit 1
          fi

          if [ ! -d ~/hub/parsers ]; then
            echo "❌ Missing parsers directory"
            exit 1
          fi

          if [ ! -d ~/hub/scenarios ]; then
            echo "❌ Missing scenarios directory"
            exit 1
          fi

          echo "✅ Hub structure looks good"

      # -----------------------------
      # Run HubTest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="
          cscli hubtest run . --report-success

      # -----------------------------
      # Extra debug on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Dumping workspace =="
          ls -R

          echo "== Dumping hub =="
          ls -R ~/hub || true
