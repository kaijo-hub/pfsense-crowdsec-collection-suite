name: CrowdSec Hub CI (upstream style)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget tar rsync

      # -----------------------------
      # Install CrowdSec (robust)
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz \
            || { echo "❌ download failed"; exit 1; }

          tar -xzf crowdsec-release.tgz \
            || { echo "❌ extract failed"; exit 1; }

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          if [ -z "$CS_DIR" ]; then
            echo "❌ CrowdSec directory not found"
            exit 1
          fi

          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          crowdsec -version || exit 1
          cscli version || exit 1

      # -----------------------------
      # Create MINIMAL config (CRITICAL)
      # -----------------------------
      - name: Create minimal config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec

          echo "common:" | sudo tee /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /tmp/crowdsec.db" | sudo tee -a /etc/crowdsec/config.yaml

          if [ ! -f /etc/crowdsec/config.yaml ]; then
            echo "❌ config.yaml missing"
            exit 1
          fi

          echo "== CONFIG =="
          cat /etc/crowdsec/config.yaml

      # -----------------------------
      # Init Hub (official way)
      # -----------------------------
      - name: Initialize hub
        run: |
          set -e

          echo "== Running hub update =="

          cscli hub update || { echo "❌ hub update failed"; exit 1; }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            ls -R /etc/crowdsec || true
            exit 1
          fi

      # -----------------------------
      # Prepare workspace hub
      # -----------------------------
      - name: Prepare hub workspace
        run: |
          set -e

          mkdir -p ~/hub

          rsync -a /etc/crowdsec/hub/ ~/hub/ \
            || { echo "❌ hub copy failed"; exit 1; }

      # -----------------------------
      # Inject repo content
      # -----------------------------
      - name: Inject collection into hub
        run: |
          set -e

          if [ ! -d parsers ]; then
            echo "❌ parsers missing"
            exit 1
          fi

          if [ ! -d scenarios ]; then
            echo "❌ scenarios missing"
            exit 1
          fi

          rsync -a parsers/ ~/hub/parsers/ || exit 1
          rsync -a scenarios/ ~/hub/scenarios/ || exit 1

          if [ -d collections ]; then
            rsync -a collections/ ~/hub/collections/
          fi

      # -----------------------------
      # Attach tests (official pattern)
      # -----------------------------
      - name: Attach tests
        run: |
          set -e

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing in repo"
            exit 1
          fi

          rm -rf ~/hub/.tests || true

          ln -s "$GITHUB_WORKSPACE/.tests" ~/hub/.tests \
            || { echo "❌ symlink failed"; exit 1; }

      # -----------------------------
      # Clean test runtime
      # -----------------------------
      - name: Clean test runtime
        run: |
          set -e

          find ~/hub/.tests -type d -name "runtime" -exec rm -rf {} + || true
          find ~/hub/.tests -type d -name "results" -exec rm -rf {} + || true
          find ~/hub/.tests -type d -name ".cache" -exec rm -rf {} + || true

      # -----------------------------
      # Debug before run
      # -----------------------------
      - name: Debug before run
        run: |
          echo "==== HUB ===="
          ls -R ~/hub || true

          echo "==== TESTS ===="
          ls -R ~/hub/.tests || true

      # -----------------------------
      # Run hubtest (FINAL)
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          echo "== Running hubtest =="

          cscli hubtest run \
            --all \
            --hub ~/hub \
            --report-success \
            --debug \
            || {
              echo "❌ hubtest failed"
              exit 1
            }

      # -----------------------------
      # Failure debug
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "==== FAILURE DEBUG ===="

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing index"

          echo "--- CONFIG ---"
          cat /etc/crowdsec/config.yaml || true

          echo "--- BINARIES ---"
          which cscli || true
          which crowdsec || true

          echo "--- VERSION ---"
          cscli version || true
          crowdsec -version || true
