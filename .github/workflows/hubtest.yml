name: CrowdSec HubTest (Clean Stable CI)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # 1. CHECKOUT
      # -------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2. DOWNLOAD (STRICT)
      # -------------------------------------------------
      - name: Download CrowdSec
        run: |
          set -euo pipefail

          echo "== Download CrowdSec master =="

          curl -fL https://codeload.github.com/crowdsecurity/crowdsec/tar.gz/refs/heads/master \
            -o crowdsec.tar.gz

          if [ ! -f crowdsec.tar.gz ]; then
            echo "❌ download missing"
            exit 1
          fi

          SIZE=$(stat -c%s crowdsec.tar.gz)
          echo "Size: $SIZE"

          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ invalid download (too small)"
            exit 1
          fi

      # -------------------------------------------------
      # 3. EXTRACT (DETERMINISTIC)
      # -------------------------------------------------
      - name: Extract
        run: |
          set -euo pipefail

          echo "== Extract =="

          rm -rf crowdsec-src
          mkdir crowdsec-src

          tar -xzf crowdsec.tar.gz -C crowdsec-src --strip-components=1

          echo "== Verify structure =="

          if [ ! -f crowdsec-src/Makefile ]; then
            echo "❌ Makefile missing"
            ls -la crowdsec-src
            exit 1
          fi

          if [ ! -d crowdsec-src/cmd ]; then
            echo "❌ cmd dir missing"
            exit 1
          fi

      # -------------------------------------------------
      # 4. BUILD (SINGLE STRATEGY)
      # -------------------------------------------------
      - name: Build CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          echo "== Install build deps =="

          sudo apt-get update -qq
          sudo apt-get install -y -qq make gcc curl git jq

          echo "== Build =="

          export BUILD_VERSION="v1.8.0-dev"
          export BUILD_RE2_WASM=1

          make build

          echo "== Verify binaries =="

          test -f cmd/crowdsec/crowdsec
          test -f cmd/crowdsec-cli/cscli

      # -------------------------------------------------
      # 5. INSTALL
      # -------------------------------------------------
      - name: Install CrowdSec
        run: |
          set -euo pipefail

          cd crowdsec-src

          sudo install -m 0755 cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 cmd/crowdsec-cli/cscli /usr/local/bin/cscli

          sudo mkdir -p /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec /etc/crowdsec/hub

          sudo cp -r config/* /etc/crowdsec/

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec /etc/crowdsec/hub

      # -------------------------------------------------
      # 6. VERIFY INSTALL
      # -------------------------------------------------
      - name: Verify install
        run: |
          set -euo pipefail

          cscli version

      # -------------------------------------------------
      # 7. HUB UPDATE
      # -------------------------------------------------
      - name: Hub update
        run: |
          set -euo pipefail

          echo "== Setup hub dir =="

          sudo mkdir -p /etc/crowdsec/hub
          sudo chmod 775 /etc/crowdsec/hub

          echo "== Ensure hub_dir in config =="

          if ! grep -q "hub_dir:" /etc/crowdsec/config.yaml; then
            echo "hub_dir: /etc/crowdsec/hub" | sudo tee -a /etc/crowdsec/config.yaml
          fi

          grep -n "hub_dir" /etc/crowdsec/config.yaml || true

          export CROWDSEC_CONFIG_DIR=/etc/crowdsec

          echo "== Run hub update =="

          cscli hub update

          echo "== Verify index =="

          test -f /etc/crowdsec/hub/.index.json

      # -------------------------------------------------
      # 8. PREPARE HUB ROOT (FIX)
      # -------------------------------------------------
      - name: Prepare hub root
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"

          echo "== Create hub root =="
          rm -rf "$HUB_ROOT"
          mkdir -p "$HUB_ROOT"

          echo "== Copy repo content =="

          cp -r parsers "$HUB_ROOT/" 2>/dev/null || echo "⚠️ no parsers"
          cp -r scenarios "$HUB_ROOT/" 2>/dev/null || echo "⚠️ no scenarios"
          cp -r collections "$HUB_ROOT/" 2>/dev/null || true
          cp -r .tests "$HUB_ROOT/" 2>/dev/null || echo "⚠️ no .tests"

          echo "== Copy index =="

          cp /etc/crowdsec/hub/.index.json "$HUB_ROOT/.index.json" \
            || { echo "❌ failed to copy index"; exit 1; }

          echo "== Verify hub root =="

          ls -la "$HUB_ROOT"

      # -------------------------------------------------
      # 9. DEBUG HUB STRUCTURE
      # -------------------------------------------------
      - name: Debug hub structure
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"

          echo "== .tests =="
          ls -R "$HUB_ROOT/.tests" || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R "$HUB_ROOT/parsers" || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R "$HUB_ROOT/scenarios" || echo "❌ scenarios missing"

      # -------------------------------------------------
      # 10. VALIDATE HUB STRUCTURE
      # -------------------------------------------------
      - name: Validate hub structure
        run: |
          set -euo pipefail

          HUB_ROOT="/home/runner/hub"

          [ -f "$HUB_ROOT/.index.json" ] || { echo "❌ Missing .index.json"; exit 1; }
          [ -d "$HUB_ROOT/.tests" ] || { echo "❌ Missing .tests"; exit 1; }
          [ -d "$HUB_ROOT/parsers" ] || { echo "❌ Missing parsers"; exit 1; }
          [ -d "$HUB_ROOT/scenarios" ] || { echo "❌ Missing scenarios"; exit 1; }

          TEST_COUNT=$(find "$HUB_ROOT/.tests" -type f | wc -l)
          [ "$TEST_COUNT" -gt 0 ] || { echo "❌ .tests empty"; exit 1; }

          echo "✅ Hub structure valid"

      # -------------------------------------------------
      # 11. HUBTEST
      # -------------------------------------------------
      - name: Hubtest
        run: |
          set -euo pipefail

          echo "== Run hubtest =="

          export CROWDSEC_CONFIG_DIR=/etc/crowdsec

          cd /home/runner/hub

          cscli hubtest run --all --report-success

      # -------------------------------------------------
      # 12. DEBUG ON FAILURE
      # -------------------------------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== DEBUG OUTPUT ===="

          echo "--- HUB ROOT ---"
          ls -la /home/runner/hub || true

          echo "--- CONFIG ---"
          ls -la /etc/crowdsec || true

          echo "--- HUB ---"
          ls -la /etc/crowdsec/hub || true

          echo "--- VERSION ---"
          cscli version || true
