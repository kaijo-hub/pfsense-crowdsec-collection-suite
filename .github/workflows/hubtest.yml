name: CrowdSec HubTest (master build go)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      GO_VERSION: "1.22"

    steps:
      # -----------------------------
      # Checkout repo
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install Go
      # -----------------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # -----------------------------
      # Build CrowdSec from master
      # -----------------------------
      - name: Build CrowdSec (master)
        run: |
          set -e

          echo "== Clone CrowdSec master =="

          git clone https://github.com/crowdsecurity/crowdsecurity.git
          cd crowdsecurity

          echo "== Build cscli =="

          make build || {
            echo "❌ build failed"
            exit 1
          }

          echo "== Install binaries =="

          sudo install -m 0755 ./cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 ./cmd/crowdsec-cli/cscli /usr/local/bin/cscli

          echo "== Verify build =="

          cscli version || {
            echo "❌ cscli not working"
            exit 1
          }

          crowdsec -t || {
            echo "❌ crowdsec test failed"
            exit 1
          }

      # -----------------------------
      # Install runtime config (master)
      # -----------------------------
      - name: Install runtime config
        run: |
          set -e

          echo "== Install config tree =="

          sudo mkdir -p /etc/crowdsec
          sudo cp -r crowdsecurity/config/* /etc/crowdsec/

          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec

          echo "== Validate required files =="

          for f in config.yaml acquis.yaml profiles.yaml simulation.yaml context.yaml; do
            if [ ! -f "/etc/crowdsec/$f" ]; then
              echo "❌ missing $f"
              exit 1
            fi
          done

      # -----------------------------
      # Hub init
      # -----------------------------
      - name: Hub update
        run: |
          set -e

          echo "== cscli hub update =="

          cscli hub update || {
            echo "❌ hub update failed"
            exit 1
          }

          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            exit 1
          fi

      # -----------------------------
      # Prepare hub workspace
      # -----------------------------
      - name: Prepare hub workspace
        run: |
          set -e

          mkdir -p ~/hub

          cp -r /etc/crowdsec/hub/* ~/hub/ || {
            echo "❌ hub copy failed"
            exit 1
          }

      # -----------------------------
      # Inject repo content
      # -----------------------------
      - name: Inject repository content
        run: |
          set -e

          echo "== injecting parsers/scenarios =="

          [ -d parsers ] && rsync -av parsers/ ~/hub/parsers/ || echo "⚠ no parsers"
          [ -d scenarios ] && rsync -av scenarios/ ~/hub/scenarios/ || echo "⚠ no scenarios"
          [ -d collections ] && rsync -av collections/ ~/hub/collections/ || echo "⚠ no collections"

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing"
            exit 1
          fi

          rm -rf ~/hub/.tests || true
          ln -s "$GITHUB_WORKSPACE/.tests" ~/hub/.tests

      # -----------------------------
      # Run hubtests
      # -----------------------------
      - name: Run hubtests
        run: |
          set -e

          cd ~/hub

          echo "== Running hubtest suite =="

          cscli hubtest run --all --hub ~/hub --report-success || {
            echo "❌ hubtest failed"
            exit 1
          }

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== DEBUG ===="

          echo "--- VERSION ---"
          cscli version || true

          echo "--- CONFIG ---"
          ls -R /etc/crowdsec || true

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing"

          echo "--- TESTS ---"
          ls -R ~/hub/.tests || true
