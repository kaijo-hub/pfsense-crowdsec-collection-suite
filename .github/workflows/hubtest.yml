name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli 2>/dev/null || true
          sudo cp "$CS_DIR/cmd/cscli/cscli" /usr/local/bin/cscli 2>/dev/null || true

          sudo chmod +x /usr/local/bin/crowdsec /usr/local/bin/cscli

          crowdsec -version
          cscli version

      # -----------------------------
      # Setup CrowdSec config (NO EOF)
      # -----------------------------
      - name: Setup CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec

          echo "common:" | sudo tee /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml

          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /tmp/crowdsec.db" | sudo tee -a /etc/crowdsec/config.yaml

          echo "api:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  server:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    listen_uri: 127.0.0.1:8080" | sudo tee -a /etc/crowdsec/config.yaml

          echo "config written:"
          cat /etc/crowdsec/config.yaml

      # -----------------------------
      # Init Hub
      # -----------------------------
      - name: Init CrowdSec Hub
        run: |
          set -e
          cscli hub update

      # -----------------------------
      # Register local hub
      # -----------------------------
      - name: Register local hub
        run: |
          set -e

          cscli hub add local $GITHUB_WORKSPACE

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          echo "== Running hubtest =="

          cscli hubtest run local \
            --all \
            --config /etc/crowdsec/config.yaml \
            --report-success

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump debug
        if: failure()
        run: |
          set -e

          echo "== Workspace =="
          ls -R $GITHUB_WORKSPACE || true

          echo "== Hub state =="
          cscli hub list || true
