name: CrowdSec HubTest (Master CI)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------------------------
      # DOWNLOAD MASTER (robust, no API issues)
      # -------------------------------------------------
      - name: Download CrowdSec master
        run: |
          set -euo pipefail

          echo "== Download CrowdSec master tarball =="

          URL="https://codeload.github.com/crowdsecurity/crowdsec/tar.gz/refs/heads/master"

          curl -fL "$URL" -o crowdsec.tar.gz || { echo "❌ download failed"; exit 1; }

          SIZE=$(stat -c%s crowdsec.tar.gz)
          echo "Downloaded size: $SIZE"

          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ tarball too small (download error)"
            exit 1
          fi

      # -------------------------------------------------
      # EXTRACT
      # -------------------------------------------------
      - name: Extract
        run: |
          set -euo pipefail

          echo "== Extract tarball =="

          tar -xzf crowdsec.tar.gz || { echo "❌ extract failed"; exit 1; }

          DIR=$(find . -maxdepth 1 -type d -name "crowdsecurity-*" | head -n 1)

          if [ -z "$DIR" ]; then
            echo "❌ source dir not found"
            exit 1
          fi

          echo "Source dir: $DIR"

          cd "$DIR"

          echo "== List files =="
          ls -la

          echo "DIR=$DIR" >> $GITHUB_ENV

      # -------------------------------------------------
      # BUILD (FIXED VERSION)
      # -------------------------------------------------
      - name: Build CrowdSec
        run: |
          set -euo pipefail

          cd "$DIR"

          echo "== Install build deps =="

          sudo apt-get update -y
          sudo apt-get install -y make gcc || { echo "❌ deps install failed"; exit 1; }

          echo "== Set BUILD_VERSION =="

          export BUILD_VERSION="v1.8-dev"

          if ! echo "$BUILD_VERSION" | grep -q '^v'; then
            echo "❌ invalid BUILD_VERSION"
            exit 1
          fi

          echo "Using BUILD_VERSION=$BUILD_VERSION"

          echo "== Build =="

          make BUILD_VERSION="$BUILD_VERSION" || { echo "❌ build failed"; exit 1; }

          echo "== Verify binaries =="

          [ -f cmd/crowdsec/crowdsec ] || { echo "❌ crowdsec missing"; exit 1; }
          [ -f cmd/crowdsec-cli/cscli ] || { echo "❌ cscli missing"; exit 1; }

          echo "DIR=$PWD" >> $GITHUB_ENV

      # -------------------------------------------------
      # INSTALL (FULL RUNTIME STRUCTURE)
      # -------------------------------------------------
      - name: Install CrowdSec
        run: |
          set -euo pipefail

          cd "$DIR"

          echo "== Install binaries =="

          sudo install -m 0755 cmd/crowdsec/crowdsec /usr/local/bin/crowdsec || { echo "❌ install crowdsec failed"; exit 1; }
          sudo install -m 0755 cmd/crowdsec-cli/cscli /usr/local/bin/cscli || { echo "❌ install cscli failed"; exit 1; }

          echo "== Install runtime tree =="

          sudo mkdir -p /usr/share/crowdsec || { echo "❌ mkdir share failed"; exit 1; }

          sudo cp -r config /usr/share/crowdsec/ || { echo "❌ config copy failed"; exit 1; }

          if [ -d patterns ]; then
            sudo cp -r patterns /usr/share/crowdsec/ || { echo "❌ patterns copy failed"; exit 1; }
          else
            echo "⚠️ patterns missing (ok)"
          fi

          if [ -d hub ]; then
            sudo cp -r hub /usr/share/crowdsec/ || true
          fi

          if [ -d plugins ]; then
            sudo cp -r plugins /usr/share/crowdsec/ || true
          fi

          echo "== Create system dirs =="

          sudo mkdir -p /etc/crowdsec
          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec

          echo "== Copy config =="

          sudo cp -r /usr/share/crowdsec/config/* /etc/crowdsec/ || { echo "❌ config install failed"; exit 1; }

          sudo chown -R runner:runner /etc/crowdsec /var/lib/crowdsec /var/log/crowdsec || true

      # -------------------------------------------------
      # VERIFY CONFIG LOADING
      # -------------------------------------------------
      - name: Verify config loading
        run: |
          set -euo pipefail

          echo "== Check config exists =="

          [ -f /etc/crowdsec/config.yaml ] || { echo "❌ config.yaml missing"; exit 1; }

          echo "== Test cscli =="

          cscli version || { echo "❌ cscli failed"; exit 1; }

      # -------------------------------------------------
      # HUB UPDATE
      # -------------------------------------------------
      - name: Hub update
        run: |
          set -euo pipefail

          echo "== Run hub update =="

          if ! cscli hub update; then
            echo "❌ hub update failed"
            exit 1
          fi

          echo "== Verify index =="

          [ -f /etc/crowdsec/hub/.index.json ] || { echo "❌ index missing"; exit 1; }

      # -------------------------------------------------
      # PREPARE HUB TEST
      # -------------------------------------------------
      - name: Prepare hub
        run: |
          set -euo pipefail

          echo "== Prepare hub dir =="

          mkdir -p "$HOME/hub" || { echo "❌ hub dir failed"; exit 1; }

          cp -r . "$HOME/hub/" || { echo "❌ copy repo failed"; exit 1; }

      # -------------------------------------------------
      # RUN HUBTEST
      # -------------------------------------------------
      - name: Run hubtest
        run: |
          set -euo pipefail

          echo "== Run hubtest =="

          cd "$HOME/hub"

          if ! cscli hubtest run; then
            echo "❌ hubtest failed"
            exit 1
          fi

      # -------------------------------------------------
      # FINAL DEBUG (ONLY ON FAILURE)
      # -------------------------------------------------
      - name: Debug (on failure)
        if: failure()
        run: |
          echo "==== FAILURE DEBUG ===="

          echo "--- CONFIG ---"
          ls -la /etc/crowdsec || true

          echo "--- HUB ---"
          ls -la /etc/crowdsec/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing"

          echo "--- VERSION ---"
          cscli version || true
