name: CrowdSec Hub CI (official style)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      CS_DEBUG: 1

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # System dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget tar git rsync

      # -----------------------------
      # Install CrowdSec (clean official binary style)
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          echo "== Download =="
          wget -q https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz \
            || { echo "❌ download failed"; exit 1; }

          tar -xzf crowdsec-release.tgz \
            || { echo "❌ extract failed"; exit 1; }

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          [ -n "$CS_DIR" ] || { echo "❌ CS dir missing"; exit 1; }

          echo "✔ CS_DIR=$CS_DIR"

          # install binaries deterministically
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/crowdsec
          sudo install -m 0755 "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/cscli

          echo "== Versions =="
          crowdsec -version || { echo "❌ crowdsec failed"; exit 1; }
          cscli version || { echo "❌ cscli failed"; exit 1; }

      # -----------------------------
      # Hub bootstrap (OFFICIAL STYLE)
      # -----------------------------
      - name: Init Hub workspace
        run: |
          set -e

          echo "== Create workspace =="

          mkdir -p ~/hub

          echo "== Hub update =="

          cscli hub update \
            || { echo "❌ hub update failed"; exit 1; }

          # validate hub index
          if [ ! -f /etc/crowdsec/hub/.index.json ]; then
            echo "❌ hub index missing"
            ls -R /etc/crowdsec/hub || true
            exit 1
          fi

          echo "== Copy hub =="

          rsync -a /etc/crowdsec/hub/ ~/hub/ \
            || { echo "❌ hub copy failed"; exit 1; }

      # -----------------------------
      # Inject repo content (your parsers/scenarios)
      # -----------------------------
      - name: Inject collection
        run: |
          set -e

          [ -d parsers ] || { echo "❌ missing parsers"; exit 1; }
          [ -d scenarios ] || { echo "❌ missing scenarios"; exit 1; }

          echo "== Inject parsers/scenarios =="

          rsync -a parsers/ ~/hub/parsers/ || { echo "❌ parser inject failed"; exit 1; }
          rsync -a scenarios/ ~/hub/scenarios/ || { echo "❌ scenario inject failed"; exit 1; }

          rsync -a collections/ ~/hub/collections/ || true

      # -----------------------------
      # Ensure hubtest structure exists
      # -----------------------------
      - name: Prepare hubtest environment
        run: |
          set -e

          if [ ! -d "$GITHUB_WORKSPACE/.tests" ]; then
            echo "❌ .tests missing in repo"
            exit 1
          fi

          if [ ! -d ~/hub/.tests ]; then
            echo "❌ hub .tests missing"
            exit 1
          fi

          echo "== Replace tests with repo version =="

          rm -rf ~/hub/.tests

          ln -s "$GITHUB_WORKSPACE/.tests" ~/hub/.tests \
            || { echo "❌ symlink failed"; exit 1; }

      # -----------------------------
      # Debug (safe, read-only)
      # -----------------------------
      - name: Debug hub state
        run: |
          echo "==== HUB STRUCTURE ===="
          ls -R ~/hub || true

          echo "==== TEST STRUCTURE ===="
          ls -R ~/hub/.tests || true

      # -----------------------------
      # RUN HUBTEST (official pattern)
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          echo "== Running hubtest =="

          cscli hubtest run \
            --all \
            --hub ~/hub \
            --report-success \
            --debug \
            || {
              echo "❌ hubtest failed"
              exit 1
            }

      # -----------------------------
      # Failure diagnostics (official style)
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "==== FAILURE DEBUG ===="

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /etc/crowdsec/hub/.index.json || echo "missing index"

          echo "--- CSCLI ---"
          cscli version || true
          crowdsec -version || true

          echo "--- TESTS ---"
          ls -R ~/hub/.tests || true
