name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Download & extract CrowdSec (PORTABLE MODE)
      # -----------------------------
      - name: Download CrowdSec portable
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          mkdir cs
          tar -xzf crowdsec-release.tgz -C cs

          # Find portable binaries
          export CROWDSEC_BIN=$(find cs -type f -name crowdsec | head -n 1)
          export CSCLI_BIN=$(find cs -type f -name cscli | head -n 1)

          chmod +x "$CROWDSEC_BIN" "$CSCLI_BIN"

          echo "CrowdSec binary: $CROWDSEC_BIN"
          echo "cscli binary: $CSCLI_BIN"

          "$CROWDSEC_BIN" -version
          "$CSCLI_BIN" version

          # Make binaries available in PATH
          echo "$(dirname "$CROWDSEC_BIN")" >> $GITHUB_PATH

      # -----------------------------
      # Prepare hub directory
      # -----------------------------
      - name: Prepare hub directory
        run: |
          set -e
          rm -rf ~/hub
          mkdir -p ~/hub
          cp -r . ~/hub/

      # -----------------------------
      # Use portable CrowdSec config
      # -----------------------------
      - name: Determine portable config path
        id: cfg
        run: |
          set -e
          CFG=$(find cs -type f -path "*/config/config.yaml" | head -n 1)
          echo "config=$CFG" >> $GITHUB_OUTPUT
          echo "Portable config: $CFG"

      # -----------------------------
      # Debug hub structure
      # -----------------------------
      - name: Debug hub structure
        run: |
          echo "== .tests =="
          ls -R ~/hub/.tests || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R ~/hub/parsers || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R ~/hub/scenarios || echo "❌ scenarios missing"

      # -----------------------------
      # Validate hub structure
      # -----------------------------
      - name: Validate hub structure
        run: |
          set -e
          [ -d ~/hub/.tests ] || (echo "❌ Missing .tests" && exit 1)
          [ -d ~/hub/parsers ] || (echo "❌ Missing parsers" && exit 1)
          [ -d ~/hub/scenarios ] || (echo "❌ Missing scenarios" && exit 1)
          echo "✅ Hub structure OK"

      # -----------------------------
      # Run hubtest (PORTABLE MODE)
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="
          echo "Using config: ${{ steps.cfg.outputs.config }}"

          cscli hubtest run . \
            --all \
            --report-success \
            --hub ~/hub \
            --config "${{ steps.cfg.outputs.config }}"

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Workspace =="
          ls -R

          echo "== Hub =="
          ls -R ~/hub || true
