name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CROWDSEC_BIN=$(find . -type f -name crowdsec | head -n 1)
          CSCLI_BIN=$(find . -type f -name cscli | head -n 1)

          chmod +x "$CROWDSEC_BIN" "$CSCLI_BIN"

          sudo cp "$CROWDSEC_BIN" /usr/local/bin/crowdsec
          sudo cp "$CSCLI_BIN" /usr/local/bin/cscli

          echo "CrowdSec version:"
          crowdsec -version
          cscli version

      # -----------------------------
      # Prepare hub (IMPORTANT: include dotfiles)
      # -----------------------------
      - name: Prepare hub directory
        run: |
          set -e
          mkdir -p ~/hub
          cp -r . ~/hub/

      # -----------------------------
      # Fix CrowdSec runtime permissions (IMPORTANT FIX)
      # -----------------------------
      - name: Setup CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec

          cat <<EOF | sudo tee /etc/crowdsec/config.yaml
common:
  daemonize: false
  log_media: stdout
  log_level: info

db_config:
  type: sqlite
  db_path: /home/runner/crowdsec.db

api:
  server:
    listen_uri: 127.0.0.1:8080
EOF

          echo "CrowdSec config written:"
          cat /etc/crowdsec/config.yaml

      # -----------------------------
      # Debug structure
      # -----------------------------
      - name: Debug hub structure
        run: |
          echo "== .tests =="
          ls -R ~/hub/.tests || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R ~/hub/parsers || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R ~/hub/scenarios || echo "❌ scenarios missing"

      # -----------------------------
      # Validate structure
      # -----------------------------
      - name: Validate hub structure
        run: |
          set -e

          test -d ~/hub/.tests || (echo "❌ Missing .tests" && exit 1)
          test -d ~/hub/parsers || (echo "❌ Missing parsers" && exit 1)
          test -d ~/hub/scenarios || (echo "❌ Missing scenarios" && exit 1)

          echo "✅ Hub structure OK"

      # -----------------------------
      # Run hubtest (CORRECT CALL)
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="

          cscli hubtest run . --report-success --hub ~/hub --config /etc/crowdsec/config.yaml

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Workspace dump =="
          ls -R

          echo "== Hub dump =="
          ls -R ~/hub || true
