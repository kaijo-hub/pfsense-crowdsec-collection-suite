name: HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec binaries
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CROWDSEC_BIN=$(find . -type f -name crowdsec | head -n 1)
          CSCLI_BIN=$(find . -type f -name cscli | head -n 1)

          if [ -z "$CROWDSEC_BIN" ] || [ -z "$CSCLI_BIN" ]; then
            echo "❌ CrowdSec binaries not found"
            exit 1
          fi

          chmod +x "$CROWDSEC_BIN" "$CSCLI_BIN"

          sudo cp "$CROWDSEC_BIN" /usr/local/bin/crowdsec
          sudo cp "$CSCLI_BIN" /usr/local/bin/cscli

          crowdsec -version
          cscli version

      # -----------------------------
      # Prepare hub
      # -----------------------------
      - name: Prepare hub directory
        run: |
          set -e
          mkdir -p ~/hub
          cp -r . ~/hub/

      # -----------------------------
      # Setup CrowdSec config (ROBUST / NO EOF / NO GUESSING)
      # -----------------------------
      - name: Setup CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec
          sudo mkdir -p /var/lib/crowdsec
          sudo mkdir -p /var/log/crowdsec

          sudo chown -R runner:runner /var/lib/crowdsec
          sudo chown -R runner:runner /var/log/crowdsec

          sudo rm -f /etc/crowdsec/config.yaml
          sudo rm -f /etc/crowdsec/profiles.yaml
          sudo rm -f /etc/crowdsec/simulation.yaml
          sudo rm -f /etc/crowdsec/context.yaml

          # config.yaml
          echo "common:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /var/lib/crowdsec/data.db" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "api:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  server:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    listen_uri: 127.0.0.1:8080" | sudo tee -a /etc/crowdsec/config.yaml

          # profiles.yaml (MINIMAL but required)
          echo "name: default" | sudo tee /etc/crowdsec/profiles.yaml
          echo "filters: []" | sudo tee -a /etc/crowdsec/profiles.yaml

          # simulation.yaml (required stub)
          echo "simulation: false" | sudo tee /etc/crowdsec/simulation.yaml

          # context.yaml (empty safe file)
          sudo touch /etc/crowdsec/context.yaml

          echo "CrowdSec config written:"
          ls -l /etc/crowdsec

      # -----------------------------
      # Debug hub
      # -----------------------------
      - name: Debug hub structure
        run: |
          echo "== .tests =="
          ls -R ~/hub/.tests || echo "❌ .tests missing"

          echo "== parsers =="
          ls -R ~/hub/parsers || echo "❌ parsers missing"

          echo "== scenarios =="
          ls -R ~/hub/scenarios || echo "❌ scenarios missing"

      # -----------------------------
      # Validate hub
      # -----------------------------
      - name: Validate hub structure
        run: |
          set -e

          [ -d ~/hub/.tests ] || (echo "❌ Missing .tests" && exit 1)
          [ -d ~/hub/parsers ] || (echo "❌ Missing parsers" && exit 1)
          [ -d ~/hub/scenarios ] || (echo "❌ Missing scenarios" && exit 1)

          echo "✅ Hub structure OK"

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e
          cd ~/hub

          echo "== Running hubtest =="

          cscli hubtest run . --all --report-success --hub ~/hub --config /etc/crowdsec/config.yaml

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "== Workspace =="
          ls -R

          echo "== Hub =="
          ls -R ~/hub || true
