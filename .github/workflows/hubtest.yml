name: CrowdSec HubTest

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install CrowdSec
      # -----------------------------
      - name: Install CrowdSec
        run: |
          set -e

          wget https://github.com/crowdsecurity/crowdsec/releases/latest/download/crowdsec-release.tgz
          tar -xzf crowdsec-release.tgz

          CS_DIR=$(find . -maxdepth 1 -type d -name "crowdsec-v*" | head -n 1)

          [ -n "$CS_DIR" ] || { echo "❌ CrowdSec dir missing"; exit 1; }

          sudo cp "$CS_DIR/cmd/crowdsec/crowdsec" /usr/local/bin/
          sudo cp "$CS_DIR/cmd/crowdsec-cli/cscli" /usr/local/bin/
          sudo chmod +x /usr/local/bin/*

          crowdsec -version || exit 1
          cscli version || exit 1

      # -----------------------------
      # FULL CONFIG (REAL FIX)
      # -----------------------------
      - name: Create full CrowdSec config
        run: |
          set -e

          sudo mkdir -p /etc/crowdsec

          # main config
          echo "common:" | sudo tee /etc/crowdsec/config.yaml
          echo "  daemonize: false" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_media: stdout" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  log_level: info" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "crowdsec:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  config_paths:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    - /etc/crowdsec/acquis.yaml" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    - /etc/crowdsec/profiles.yaml" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    - /etc/crowdsec/simulation.yaml" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    - /etc/crowdsec/context.yaml" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "db_config:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  type: sqlite" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  db_path: /tmp/crowdsec.db" | sudo tee -a /etc/crowdsec/config.yaml
          echo "" | sudo tee -a /etc/crowdsec/config.yaml
          echo "api:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "  server:" | sudo tee -a /etc/crowdsec/config.yaml
          echo "    listen_uri: 127.0.0.1:8080" | sudo tee -a /etc/crowdsec/config.yaml

          # required files
          echo "" | sudo tee /etc/crowdsec/acquis.yaml
          echo "policies: []" | sudo tee /etc/crowdsec/profiles.yaml
          echo "simulation: false" | sudo tee /etc/crowdsec/simulation.yaml
          echo "{}" | sudo tee /etc/crowdsec/context.yaml
          echo "{}" | sudo tee /etc/crowdsec/local_api_credentials.yaml
          echo "{}" | sudo tee /etc/crowdsec/online_api_credentials.yaml

          echo "✅ Full config created"

      # -----------------------------
      # Init hub
      # -----------------------------
      - name: Init hub
        run: |
          set -e

          mkdir -p ~/hub

          cscli hub update || { echo "❌ hub update failed"; exit 1; }

          [ -f /etc/crowdsec/hub/.index.json ] || { echo "❌ missing index"; exit 1; }

          sudo cp -r /etc/crowdsec/hub/* ~/hub/
          sudo chown -R $USER:$USER ~/hub

      # -----------------------------
      # Inject repo
      # -----------------------------
      - name: Inject repo
        run: |
          set -e

          rsync -av parsers/ ~/hub/parsers/
          rsync -av scenarios/ ~/hub/scenarios/
          rsync -av collections/ ~/hub/collections/ || true

      # -----------------------------
      # Prepare tests
      # -----------------------------
      - name: Prepare tests
        run: |
          set -e

          mv ~/hub/.tests ~/hub/.tests.orig
          ln -s $GITHUB_WORKSPACE/.tests ~/hub/.tests
          cp ~/hub/.tests.orig/template_* ~/hub/.tests/

      # -----------------------------
      # Run hubtest
      # -----------------------------
      - name: Run hubtest
        run: |
          set -e

          cscli hubtest run --all --hub ~/hub --report-success || {
            echo "❌ hubtest failed"
            exit 1
          }

      # -----------------------------
      # Debug
      # -----------------------------
      - name: Debug on failure
        if: failure()
        run: |
          echo "==== DEBUG ===="
          ls -R ~/hub || true
          cat /etc/crowdsec/config.yaml || true
