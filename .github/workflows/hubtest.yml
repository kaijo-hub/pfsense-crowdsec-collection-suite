name: CrowdSec HubTest (master CI)

on:
  push:
  pull_request:

jobs:
  hubtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      # -----------------------------
      # Download CrowdSec (correct repo!)
      # -----------------------------
      - name: Download CrowdSec source (master)
        run: |
          set -e

          echo "== Download CrowdSec (master) =="

          curl -L \
            https://github.com/crowdsecurity/crowdsec/archive/refs/heads/master.tar.gz \
            -o crowdsec.tar.gz

          SIZE=$(stat -c%s crowdsec.tar.gz)
          echo "Downloaded size: $SIZE"

          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ Download failed or invalid archive"
            head -c 200 crowdsec.tar.gz || true
            exit 1
          fi

      # -----------------------------
      # Extract
      # -----------------------------
      - name: Extract CrowdSec
        run: |
          set -e

          echo "== Extract =="

          mkdir crowdsec-src
          tar -xzf crowdsec.tar.gz -C crowdsec-src --strip-components=1 || {
            echo "❌ extract failed"
            exit 1
          }

          ls -l crowdsec-src

      # -----------------------------
      # Build CrowdSec
      # -----------------------------
      - name: Build CrowdSec
        run: |
          set -e

          echo "== Build CrowdSec =="

          cd crowdsec-src

          make build || {
            echo "❌ build failed"
            exit 1
          }

          ls -l cmd/crowdsec/crowdsec
          ls -l cmd/cscli/cscli

      # -----------------------------
      # Install (portable mode FIX)
      # -----------------------------
      - name: Install CrowdSec (portable layout)
        run: |
          set -e

          echo "== Install CrowdSec =="

          sudo install -m 0755 crowdsec-src/cmd/crowdsec/crowdsec /usr/local/bin/crowdsec
          sudo install -m 0755 crowdsec-src/cmd/cscli/cscli /usr/local/bin/cscli

          # CRITICAL: config next to binary (portable mode!)
          sudo mkdir -p /usr/local/bin/config
          sudo cp -r crowdsec-src/config/* /usr/local/bin/config/

          sudo chmod -R a+r /usr/local/bin/config

          echo "== Verify =="
          crowdsec -version
          cscli version

      # -----------------------------
      # Prepare Hub
      # -----------------------------
      - name: Prepare Hub
        run: |
          set -e

          echo "== Prepare hub =="

          mkdir -p ~/hub

          cscli hub update || {
            echo "❌ hub update failed"
            exit 1
          }

          if [ ! -f /usr/local/bin/config/hub/.index.json ]; then
            echo "❌ missing hub index"
            exit 1
          fi

          cp -r /usr/local/bin/config/hub/* ~/hub/ || true

          echo "== Hub content =="
          ls -R ~/hub || true

      # -----------------------------
      # Inject your repo into hub
      # -----------------------------
      - name: Inject collection
        run: |
          set -e

          echo "== Inject parsers/scenarios =="

          rsync -av parsers/ ~/hub/parsers/ || true
          rsync -av scenarios/ ~/hub/scenarios/ || true
          rsync -av collections/ ~/hub/collections/ || true

      # -----------------------------
      # Prepare tests
      # -----------------------------
      - name: Prepare tests
        run: |
          set -e

          echo "== Prepare tests =="

          if [ ! -d ".tests" ]; then
            echo "❌ .tests missing"
            exit 1
          fi

          rm -rf ~/hub/.tests
          cp -r .tests ~/hub/.tests

          ls -R ~/hub/.tests

      # -----------------------------
      # Clean runtime
      # -----------------------------
      - name: Clean runtime
        run: |
          set -e

          echo "== Clean runtime =="

          find ~/hub/.tests -type d -name runtime -exec rm -rf {} + || true
          find ~/hub/.tests -type d -name result -exec rm -rf {} + || true
          find ~/hub/.tests -type d -name .cache -exec rm -rf {} + || true

      # -----------------------------
      # Run HubTest
      # -----------------------------
      - name: Run HubTests
        run: |
          set -e

          echo "== Run HubTests =="

          cscli hubtest run --all --hub ~/hub --report-success || {
            echo "❌ hubtest failed"
            exit 1
          }

      # -----------------------------
      # Debug on failure
      # -----------------------------
      - name: Debug
        if: failure()
        run: |
          echo "==== FAILURE DEBUG ===="

          echo "--- HUB ---"
          ls -R ~/hub || true

          echo "--- INDEX ---"
          cat /usr/local/bin/config/hub/.index.json || echo "missing index"

          echo "--- CONFIG ---"
          ls -l /usr/local/bin/config || true

          echo "--- VERSION ---"
          cscli version || true
          crowdsec -version || true
