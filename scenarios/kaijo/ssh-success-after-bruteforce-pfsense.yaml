type: leaky
name: kaijo/ssh-success-after-bruteforce-pfsense
description: >
  Detect successful SSH login after multiple failed attempts on pfSense systems.
  Tracks multiple failed auth attempts including MaxAuthExceeded and triggers
  when a success occurs after repeated failures.

filter: |
  evt.Meta.service == "ssh"
  && evt.Meta.log_type in [
    "ssh_failed_auth",
    "ssh_pam_auth_error",
    "ssh_invalid_user",
    "ssh_pre_auth",
    "ssh_permission_denied",
    "ssh_timeout_before_auth",
    "ssh_max_auth_exceeded",
    "ssh_success"
  ]

groupby: evt.Meta.source_ip

capacity: 5        # trigger after 5 accumulated events
leakspeed: 15m     # bucket drains slowly
blackhole: 5m      # ignore repeated events after trigger
reprocess: true

condition: |
  evt.Meta.log_type == "ssh_success"  
# trigger for success after the failed attempts

labels:
  service: ssh
  remediation: true
  confidence: 3
  spoofable: 0
  classification:
    - attack.T1110
  behavior: "ssh:success-after-bruteforce"
  label: "SSH Success After Bruteforce (pfSense)"
