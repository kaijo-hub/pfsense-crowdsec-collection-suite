type: leaky
name: kaijo/ssh-conn-closed-scan-pfsense
description: "Detect SSH closed-connection scanning on pfSense"

filter: |
  evt.Meta.service == "ssh"
  && evt.Meta.log_type in ["ssh_closed", "ssh_disconnect"]

groupby: evt.Meta.source_ip
distinct: evt.Parsed.src_port
capacity: 5
leakspeed: 20s
blackhole: 1m
reprocess: true

labels:
  service: ssh
  remediation: true
  confidence: 3
  spoofable: 0
  classification:
    - attack.T1595
  behavior: "ssh:scan"
  label: "SSH Closed-Connection Scan (pfSense)"
